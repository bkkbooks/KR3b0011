  text: 欽定四庫全書子部二
  hash: sha256:7e32dae4903853b48f89828e61d4081cf4abc5e504c25d2bc384a1194cb036b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0011_WYG_000-1a, image: WYG0726/WYG0726-0163a.png}
body:
  text: 太白隂經兵家類提要臣等謹案太白隂經八卷唐李筌撰筌里籍未詳惟集仙傳稱其仕至荆南節度副使仙州刺史著太白隂經又神仙感遇傳曰筌有將畧作太白隂符十卷入山訪道不知所終太白隂符當即此書傳寫訛一字也考唐書藝文志宋史藝文志皆云太白隂經十卷而此本止八卷疑非完帙然核其篇目始於天地隂陽險阻終於雜占首尾完具又似無所闕佚殆後人傳寫有所合併故卷數不同歟兵家者流大抵以權謀相尚儒家者流又往往持論迂濶諱言軍旅葢兩失之筌此書先言主有道徳後言國有富强内外兼修可謂持平之論其人終於一郡其術亦未有所試不比孫吴穰苴李靖諸人以將畧表見於後世然杜佑通典兵類取通論二家一則李靖兵法一即此經其攻城具篇則取為攻城具守城具篇築城篇鑿濠篇弩臺篇烽燧臺篇馬舖土河篇㳺奕地聴篇則取為守拒法水攻具篇則取為水戰具濟水具篇則取為軍行渡水火攻具篇火戰具篇則取為火兵井泉篇則取為識水泉宴娱音樂篇則取為聲感人是佑之採用此書與李靖之書無異其必有以取之矣靖之兵法宋時已殘闕舛訛阮逸所傳又亂以偽本筌此經至今猶存惟篇首隂經總序及天地無隂陽篇有録無書不知佚於何時今則無從校補矣乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a46d9f5e6d95b27bbf2b72dd80f9f282db376754f2671037fdd4e8a0e9864bd5

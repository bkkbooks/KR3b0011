body:
  text: 太白隂經卷一唐李筌撰人謀上隂經總序第一原闕天地無隂陽篇第二原闕人無勇怯篇第三經曰勇怯有性强弱有地秦人勁晉人剛吳人怯蜀人懦楚人輕齊人多詐越人澆薄海岱之人壯崆峒之人武燕趙之人鋭涼隴之人勇韓魏之人厚地勢所生人氣所受勇怯然也且勇怯在謀强弱在勢謀能勢成則怯者勇謀者奪也夫制勇怯之道言秦人勁申屠之子敵於嶢闗杜洪之將北於􅀈水則秦人何得而稱勁呉人怯吳王夫差兵無敵於天下敗齊於艾陵爭長於黄池則吳人何得而稱怯蜀人懦諸葛孔明撮巴蜀之衆窺兵中原身為殭屍而威加魏將則蜀人何得而稱懦楚人輕項羽破秦虜王離殺蘓角威加海内諸侯俯伏莫敢仰視楚人何得而稱輕齊人多詐田横感五百烈士東奔海島及死同日伏劍則齊人何得而稱詐越人澆薄越王勾踐以殘亡之國恤孤老之衆九歲滅吳以弱攻强以小取大則越人何得而稱澆薄燕趙之人銳蚩尤敗於涿鹿燕丹死於易水王濬縛於薊門公孫戮於上谷則燕趙之人何得而稱鋭涼隴之人勇所謂勇怯在乎法成敗在乎智怯人使之以刑勇人使之以賞刑能移人之性賞能勵人之心者在刑賞之間勇之與怯於人何有哉主有道徳篇第四經曰古者三皇得道之統立於中央神馬化逰以撫四方天下無所歸其功道廢王者出而尚仁義仁義廢伯者岀而尚智力智力廢戰國出而尚詭詐聖人之道不足以理則用法法不足以理則用術術不足以理則用權權不足以理則用勢勢用則大兼小强吞弱周建一千八百諸侯其後併為六國六國連兵結難戰争日起六國之君非疏道德而親權勢權勢用不得不親道德廢不得不疏其理然也惟聖人能返始復本以正理國以竒用兵以無事理天下正者名法也竒者權術也以名法理國則萬物不能亂以權術用兵則天下不能敵以無事理天下則萬物不能撓不撓則神清神清者智之原智平者心之府神清智平乃能形物之情人主知萬物之情裁而用之則君子小人不失其位夫徳厚而位卑者謂之過徳薄而位尊者謂之失寧過於君子無失於小人過於君子則物得其理失於小人則物罹其殃故曰人不鑒於流水而鑒於止水以其清且平也人主之道清平則任人不失其材六官各守其職四封之内百姓之事任之於相四封之外敵國之事任之於將語曰將相明國無兵舜以干戚而服有苗魯以頖宫而來淮夷以道勝者帝以徳勝者王以謀勝者伯以力勝者强强兵滅伯兵絕帝王之兵前無敵人主之道信其然矣國有强富篇第五經曰國之所以富强者審權以操柄審數以御人課農者術之事而富在律謀戰者權之事而强在兵故曰興兵而伐叛則武爵任武爵任則兵强按兵而勸農桑勸農桑則國富國不法地不足以成其富兵不法謀不足以成其强古者聖人法天而皇賢君法地而帝智主法人而伯乘天之時因地之財用人之力乃可以富强乘天時者春植穀秋植麥夏長成冬備藏因地之財者國有沃野之饒而人不足於食器用不備也國有山海之利而人不足於財商旅不備也通四方之珍異以有易無謂之商旅飭力以長地之財用資軍實謂之農夫絲麻以成其衣服謂之女工雲夢之毛羽黔溪之丹砂荆揚之革角骨江衡之柟梓㑹稽之箭燕齊之魚鹽㫋裘兗豫之枲絺苧鄭之刀宋之斤魯之削吳越之劍燕之角荆之簳妢胡之笴吳越之金錫此地之財也燕之涿郡趙之邯鄲魏之温軹韓之滎陽齊之臨淄陳之宛丘鄭之陽翟周之上洛越之具區楚之雲夢齊之鉅鹿宋之孟諸此地之良也共居其地非有灾害疾病而貧者非惰則奢世無竒業而獨富貴者非儉則力同列而相臣妾者富貴使然也同貫而相兼併者强弱使然也同地而或强或弱者理亂使然也茍有市井交易所通貨財可積也夫有容身之地智者不言貧地誠任不患無財人誠用不畏强禦故神農教耕而王天下湯武戰伐而服諸侯國愚則智可以强國智則力可以强人用智者可以强於内而富於外富於内而强於外是以漢武帝而平百粤以為園圃却羗胡以為苑囿珍怪異物充於後宫騊駼駃騠實於外廏馬庻乘堅良人間厭橘柚此謂智强於内而富於外秦孝公行墾草之令使商不得糴廢逆旅一山澤貴酒肉之價重關市之賦使農逸而商勞行之數年而倉廪實人知禮義至於始皇為之資東向而併吞諸侯此謂力富於内而兵强於外也故知王伯之業非智不戰非農不贍過此以徃而致富强者未之有也賢有遇時篇第六經曰賢人之生於世無藉地無貴宗無竒狀無智勇或賢或愚乍酗乍醒不可以事跡求不可以人物得其得之者在明君之心道合而志同信符而言順如覆水於地先流其濕如燎火於原先就其燥故伊尹有莘之耕夫夏癸之酒保湯得之於鼎餁之間升陑而放桀太公朝歌之鼔刀棘津之賣漿周得之於垂綸之下殺紂而立武伍員披髪徒跣挾弓矢乞食於吳闔閭向風而高其義下階迎之三日與語任之不疑范蠡生於五户之墟為童時内視若盲反聴若聾時人得之至狂大夫種來觀而知其賢叩門而請謁相與歸於地户管夷吾束縳於魯齊桓公任之以相百里奚自鬻於秦秦穆任之以政韓信南鄭之亡卒淮隂之怯夫漢高歸之以謀故曰人君之心如明鑑如澄泉圓明於中形之於外則使賢任能不失其時有非心之見非智之知因人之視借人之聽其有炫眊叟以黼黻𤣥黄詔聾者以韶濩宫徴無貫於心欲求得人而幸其霸未之有也故五帝得其道而興三王失其道而廢興之道在人主之心得賢之用將有智勇篇第七經曰太古之初有伯王氏至於容城氏不令而人自化不罰而人自齊不賞而人自勸不知怒不知喜俞然若赤子庖犧氏神農氏教而不誅軒轅氏陶唐氏有虞氏誅而不怨蓋三皇之政以道五帝之政以德夏商湯武王廢道德任智謀秦商鞅李斯之智而并諸侯漢張良陳平之智而滅項籍光武任冦恂馮異之智而降樊崇曹公任許攸曹仁之智而破袁紹孫權任周瑜魯肅之智而破魏武劉備任諸葛亮之智而王西蜀晉任杜預王濬之智而平吳苻堅任王猛之智而定八州之衆石勒任張賔之智而生擒王浚拓䟦任崔浩之智而保河朔之師宇文任李穆之智而挫高歡之鋭梁王任僧辯之智而靣縛陳主太宗任李靖之智而破頡利可汗有國家者未有不任智謀而成王業者也故曰將軍之事以靜正理以神察㣲以智役物見福於重闕之内慮患於杳𠖇之外者將之智謀也實有隂經篇第八經曰古之善用兵者必重天下之權而研諸侯之慮重權不審不知輕重强弱之稱揣情不審不知隠匿變化之動靜重莫難於周知揣莫難於悉舉事莫難於必成此三者聖人能任之故兵有百戰百勝之術非善之善者也不如不戰而屈人之兵善之善者也夫太上用計謀其次用人事其下用戰伐用計謀者營惑敵國之主隂遺諂臣以事佐之惑以巫覡使其尊鬼事神重其彩色文繡使賤其菽粟令空其倉廪遺之美好使榮其使榮其志遺之巧匠使起宫室高臺以竭其財役其力易其性使奢暴驕恣賢人結舌莫肯匡助濫賞滛刑任其喜怒政令不行信卜祠鬼奸邪進諂請謁公行而無聖人之政愛而與官無功而爵未勞而賞喜則赦罪怒則肆殺法居而自順令出而不行信蓍龜卜筮鬼神禱祠讒諂諛佞竒技貨財行於門户其所謂是者皆非非者皆是離君臣之際塞忠讜之路然後滛之以色攻之以利娛之以樂飬之以味以信為欺以欺為信以忠為叛以叛為忠諫者死諛佞者賞令君子在野小人在位急令暴刑人不堪命所謂未戰以隂謀傾之其國素已破矣以兵從之其君可虜其國可隳其城可㧞其衆可潰故周用之而殷紂殺越用此而吳國墟楚用此而陳蔡舉三家用此而魯滅韓魏用此而東周分儒生之言皆曰兵强大者必勝小弱者必亡是則十國之君無霸王之業萬乘之主無破亡之兆昔夏廣而湯狹殷大而周小越弱而吳强所謂不戰而勝者順傾之術襲行之道文武之教聖人昭然獨見忻然獨樂其兹乎數有探心篇第九經曰古者隣國烽烟相望雞犬相聞而足跡不絕於諸侯之境車軌不結於千里之外以道存生以徳安形人樂其居後世澆風起而淳朴散權智用而譎詐生隣國徃來用間諜縱横之事用隠括之人矣徐偃守仁義社稷丘墟魯尊儒墨宗廟冺滅非達奥智慧不能禦伐不勞心苦思不能原事不悉見情偽不能成名材智不明不能用兵忠直不任不能知人是以鬼谷先生述捭闔揣摩飛箝扺巇之篇以教蘓秦張儀逰說於諸侯之國而探諸侯之心於是術行焉夫用探心之數者先以道徳仁義禮樂忠信詩書經傳子史計謀成敗渾而雜説包而羅之澄其心靜其志伺人之情有所愛惡去就從欲而攻之隂慮而陽發必虗徃而實來此虗言而徃彼實心而來因其心察其容聼其聲考其辭言不合者反而求之其應必出既得其心反射其意符應不失契合無二膠而漆之無使返復如養由之操弓逄䝉之挾矢百發無不中正者設罝罦以網魚兎張其腰脇其虗必衝網而掛目亦奚有孑遺哉夫探智人之心必以信勿以財探勇士之心必以義勿以懼探智人之心必以忠勿以欺探愚人之心必以蔽勿以明探小人之心必以懼勿以常探好財之心必以賄勿以廉夫與智者言依於博智有涯而博無涯則智不可以測博與博者言依於辯博古而辯應今則古不可以應今與貴者言依於勢貴位高而勢制高則位不可以禁勢與富者言依於物富積財而物可寶則財不足以易寶與貧者言依於利貧匱乏而利豐贍則乏不可以調豐與賤者言依於謙賤人下而謙降下則賤不可以調謙與勇者言依於敢勇不懼而取剛毅則勇不可以懾剛與愚者言依於銳愚質朴而銳聰明則朴不可以察聰此八句皆本同其道而末異其表同其道人所欲聼異其聼而不曉如此則不測淺不測深吾得出無閒入無災獨往而獨來或縱而或横如偃枯草使東而東使西而西如引渟水決之則流壅之則止用謀何患乎不從哉夫道貴制人不貴制於人制人者握權也制於人者遵命也制人之實避人之長攻人之短見己之所長蔽己之所短故獸之動必先爪牙禽之動必先嘴距蟄蟲之動必先毒介蟲之毒必以甲夫禽獸蟲豸尚用所長以制物况其智者乎夫人之好言道德者必以仁義折之好言儒墨者必以縱横禦之好談法律者必以權術挫之必乖其始合其終摧其牙落其角無使出吾之右徐以慶弔之言憂喜其心使神不得為心之主長生安樂富貴尊榮聲色喜悦慶言也死亡憂患貧賤苦辱刑戮誅伐弔言也與貴者談言弔則悲與賤者談言慶則悅將其心迎其意或慶或弔以惑其志情變於内者形變於外常以所見而觀其所隠所謂測隠探心之數也雖有先王之道聖智之術而無此者不足成霸王之業也政有誅强篇第十經曰夫國有亂軍者士卒怯弱器械柔銳政令不一賞罰不明不預焉所謂亂軍者豪家權臣閽寺嬖昵為之軍吏權軍之勢擅將之威公政私行私門公謁上發謀下沮議上升令下不行猛如虎貪如狼狠如羊强不可制者是亂軍皆宜誅之文宣誅少正卯於兩觀而魯國清田穰苴斬莊賈於表下而軍容肅魏絳戮揚干而諸侯服夫誅豪者益其威戮强者増其權威權生於豪强之身而不在於士卒之庸豪强有兼才者則駕而御之教而導之如畜鷙鳥如養猛虎必節其飢渴翦其牙爪絆其足結其舌呼之而随嗾之而走牢籠其心使馴吾之左右豪强無兼才者則長其惡積其凶縱其心横其氣使禍盈於三軍結怨於萬人然後誅以壯吾氣故曰不善人者善人之資為將帥者國之師不誅豪强何以成軍之威哉太白隂經卷一

body:
  text: 太白隂經卷五唐李筌撰預備總序經曰不備不虞不可以帥師愚者有備與智者同功故天下有道守在四境諸侯有道守在四隣國所以立疆塲關塞亭障者將欲别内外乖夷狄置烽燧刁斗者所以警邊徼勵士卒也築城篇第四十三經曰先王之制大都不過三國之一中五之一小九之一故曰都城過百雉國之害也今諸侯之城方兩京之城濶狹合五之一其高為邊隅之守不可為節制古今度城之法者城下濶與高倍上濶與下倍城高五丈下濶二丈五尺上濶一丈二尺五寸高濶狹以此為準料功以下濶加上濶得三丈七尺五寸半乘之得一丈八尺七寸五分以高丈乘之一尺之城積數得九十二丈七尺五寸每一工日築二丈計工四十六人日築城一丈餘七尺五寸一步計役二百七十八人餘五一百步計工二萬七千八百二人餘一丈土一里計工一十萬一百九十人餘一丈土率一里則十里可知其出土負匱並計二丈土以工其羊馬城於濠内築高八尺上置土女墻計工準上鑿濠篇第四十四經曰濠面濶一丈深一丈底濶一丈以面濶加底濶積數三丈之半得數一丈五尺深一丈乃乘之鑿濠一丈得數一十五丈每一工岀土三丈計工五人一步計工三十人一里計工一萬八千人一里為率則百里可知弩臺篇第四十五經曰臺高下與城等去我城百步臺相去亦如之濶四丈高五丈上濶二丈上建女牆臺内通暗道安屈膝梯人上便卷之收之中設氊幕置弩手五人備乾糧水候等候敵近城壘則攅弩射其來將烽燧臺篇第四十六經曰明燧於高山四望險絕處置無山亦於平地高迥處置下築羊馬城高下任便常以三五為準臺五丈下濶三丈上濶一丈形圓上蓋屋覆之徑濶一丈六尺一面挑出三尺以板為之上覆下棧屋上置突竈三所臺亦置三所並以石灰飾其表裏復置柴籠三所流大繩三條在臺側上下用軟梯上收下垂四壁開孔望賊及安望火筒置旗一面皷一面弩兩張砲石壘水停水瓮生糧乾糧麻蘊火鑽火箭蒿艾狼糞牛糞每夜平安舉火一把聞警舉二把見煙舉三把見賊舉燒柴籠如早夜平安不舉節烽子為賊提一烽六人五人烽子逓加更刻觀望動靜一人烽率知文書符牒傳逓馬鋪土河篇第四十七經曰每鋪相去四十里如驛近逺於要路山谷間牧馬兩匹與遊奕計㑹有事警急煙塵入境則奔相報致土河於山口賊路横截道鑿之横濶二丈深二尺以細沙散土填平早夜行檢掃令平净有狐兎入境亦知足跡多少况於人馬乎遊奕地聼篇第四十八經曰於遊兵中選驍果諳山川泉者與烽子馬鋪土河計㑹交牌日夕邏候於亭障之外捉生事問敵營虛實我之密謀勿令逰奕人知其副子將並久諳軍旅好身手者任他選少睡者令枕空䍡卧有人馬行三十里外東西南北皆有響見於朝䍡中名曰地可預防奸野猪皮為䍡尤妙報平安篇第四十九經曰報平安者諸營舖百司主掌皆入五更有動靜報虞候知左右虞候早出大將軍牙前帶刀磬折大聲通曰左右廂兵馬及倉庫營並平安諾復退本班如有盗賊動靜𦂳急即具言其事若在野行軍即言行營兵馬及更舖並平安嚴警皷角篇第五十經曰夫城軍野營行軍在外一更初日没時槌皷一通三百三十槌為一通皷音止則角音動吹一十二聲角為一叠角音止則皷音動如此三皷三角而昏明畢行軍第一角聲動兵士起第二角聲動戎装了第三角聲動中外辦角音絕兵馬齊動而發定舖篇第五十一經曰每日戌時嚴警皷角初動虞候甲士十二隊建旗幟立號頭廵軍營及城上如在野廵營外定更舖疎密坐者喝曰是甚麽人巡者答曰虞候總管某乙巡坐喝曰作甚行答曰定舖坐喝曰是不是行答曰是如此者三喝三答坐曰虞候總管過號頭及坐喝曰聲雄者允夜號更刻篇第五十二經曰夜取號於大將軍處粘藤紙二十四張十五行界印縫安標軸題首云某年某月某日號簿毎日戌時虞候判官持簿於大將幕取意於一行中書兩字上一字坐是喝下一字行是答於將軍前開函付請號各到彼巡檢所主者以本鑰起開函告報不得令有漏泄一晝夜行二十四張三百六十行盡一載更别其簿更漏牌一日一夜一百刻以竹馬為一百牌長三寸濶一寸逐日題云某月更牌一日一夜計行二百里探更人每刻徐疾行二里常取月氣為正雨水正月中夜轉牌四十九四分一更傳牌九餘一里一百七十三步三尺三寸春分二月中夜轉牌五十一更傳牌十穀雨三月中夜轉牌三十七六分一更傳牌七餘一里一十四步二尺小滿四月中夜轉牌三十六三分一更傳牌七餘一百七十步四尺八寸夏至五月中夜轉牌三十五分一更傳牌七大暑六月中夜轉牌三十六二分一更傳牌餘一百七十五步一尺二寸處暑七月中夜轉牌三十六三分一更傳牌七餘一百七十五步一尺二寸秋分八月中夜轉牌四十四五分一更傳牌八餘一里二百八十六步一尺二寸霜降九月中夜轉牌四十九五分一更傳牌九餘一百十八步五尺六寸小雪十月中夜轉牌五十三三分一更傳牌十餘一里一百一十五步一尺二寸冬至十一月中夜轉牌五十五一更傳牌十一大雪十二月中夜轉牌五十三三分餘一里一百二十五步一尺二寸右件古法多不合今鄉導篇第五十三經曰即鹿無虞徒入於林中不用鄉導難得地利夫用其鄉導者不必土人但諳彼山川之險易敵之虛實即可任也賞之使厚收其心也備之使嚴防其詐也是故錫之以官爵富之以財帛使有所戀匹之以妻子使有所懷然後察其辭鑒其色覆其言始終如一可以用之也井泉篇第五十四經曰沙磧鹵莽之中有水野馬黄羊之蹤㝷之有水烏鳥集處有水地生葭葦菰蒲之處有伏泉地有蟻壤之處下有伏泉迷途篇第五十五經曰逺征路迷南北不分常以北辰為正正月昏奎中朝尾中二月昏弧中朝建星中三月昏七星中朝牽牛中四月昏翼星中朝婺女中五月昏亢中朝危中六月昏心中朝奎中七月昏建星中朝畢中八月昏牽牛中朝觜中九月昏虛中朝柳中十月昏危中朝七星中十一月昏東壁中朝軫中十二月昏婁中朝氐中其隂雪則用老馬引前昔齊桓公伐孤竹值雪迷路驅老馬㝷途不迷搜山燒草篇第五十六經曰軍至險阻溝間林泊翳薈葭蘆草莽之處翔鳥不下伏獸驚起草木無風而動必謹察之恐伏奸也邊城十月一日燒境上草及惡山深谷大川連水左近草樹虜騎若來無所伏藏前茅後殿篇第五十七經曰周禮挈壺以令軍井挈轡以令軍舎挈合以令軍糧前茅慮無建旗幟以表之皆古法也令以先鋒令先探井泉水草宿止賊路與鄉導計㑹及進軍戰則有喝後皆㧞白刃以臨使之進如却便斬敵來追我則後殿與戰無驚擾大軍也釁皷篇第五十八經曰軍臨敵境使逰奕捉敵一人立於六纛之前祝曰逆冦不道敢干天常皇帝授我旗皷翦滅兇渠見吾旗纛者目眩聞吾鼙皷者魄散令敵人跪纛前乃腰斬之首横路之左足横路之右取血以釁皷鼙六纛從首足間過兵馬六軍從之而往出必勝敵亦名祭敵屯田篇第五十九經曰洪範八政食乃為先是以商鞍入秦行墾草之令夷吾霸齊富農工之術夫地所以養人城所以守地務耕者其人不衰務守者其地不危務戰者其城不圍四海之内六合之中有奚貴曰貴於土奚貴於土曰人之本奚貴於人曰國之本是以興兵伐叛而武爵任武爵任則兵勝按兵務農則粟富粟富則國強人主待農戰而遵三時務農一時講武使士卒入無遺力出有餘糧所謂興兵而勝敵按兵而國富也合屯田六十頃四十頃榖種子五頃大豆種子五頃麥子五頃麻種子五頃蕎種子屯外五十畞菜不入至秋納宴設厨四十畞蔓菁種子十畞蘿蔔種子以上種子各依鄉原種一屯六十丁一丁給米二升一日一石二斗一月三十六石一年四百三十二石牛料一頃屯六頭牛日給豆五升十月一日起料四月一日停一日三石一月九十石六月六百四十石一屯丁種牛料種子來屯來束以長三百七十八尺五寸三分三毫繩之四分之一長九十三尺六寸三分四毫四月桀橛繩内有田一畞對屯田官分三等田内上中下來之以三尺五寸圍成束則數來三等可知來屯苗子横來取三等束對屯田官打下苗子斗升合數為兩絹袋各盛苗子一碗與屯田官者來使對一椀與使掌者屯田封其後恐有耗損者來米取子一斗平量對屯田官擣來得幾米為率則一屯斛斗可知等級殊等九千石第一等七千石第二等六千石第三等五千石歲無水旱災蝗滿四千石者屯田官有殿一軍一載粟一十二萬八千石六分支米九萬石以殊等屯一十四餘萬二千石方支一歲糧神農書曰雖金城十仞湯池百步帶甲十萬而無粟者不能守也故充國伐西戎杜茂守北鄙創置屯田以為耕植也人糧馬料篇第六十經曰一軍一萬二千五百人人日支米二升一月六斗一年七石二斗一軍一日支米二百五十石一月七千五百石一年九萬石以六分支粟一人日支粟三升三合三勺三抄三圭三粒一月一石一年一十二石一軍一年二十萬八千石小月人支粟九斗六升六合六抄六勺六圭六粒其大麥八分小麥六分蕎麥四分大豆八分小豆七分豌豆七分麻七分黍七分並依分折米人鹽一人日支半合一月一升五合一年一斗八升一軍一日六石一月一百八十七石五斗一年二千三百五十石馬料一人二匹一軍二萬五千匹朔方河西一人二匹范陽河東隴右安西北庭則二人三匹平盧劍南嶺南則一人一匹計馬二萬五千匹為一隊計五百萬五千匹為一隊分為十坊抹馬五十隊十月一日起料四月一日停料一馬一日支粟一斗一月三石六箇月一十八石一軍馬一日支粟一千二百五十石一月三萬七千五百石六箇月二十三萬五千石馬鹽一日支鹽三合一月九升六箇月五斗四升一軍馬日支鹽六十七石五斗一月一千四百九十五石六箇月八千七百九十石茭草一馬一日支茭草二圍一月六十圍六箇月三百六十圍一軍軍馬六箇月九十萬圍醫油藥其油藥取逃亡兵士殘糧賜醫獸人於馬押官郡頭中差取軍資篇第六十一經曰軍無財士不來軍無賞士不往香餌之下必有懸魚重賞之下必有死夫興兵不有財帛何以結人心哉軍士一人一年支絹布一十二疋絹七萬五千疋布七萬五千疋賞賜馬鞍轡二十具錦一百疋緋紫襖子衫具帶魚袋五十副色羅三疋婦人錦繡夾襭衣披袍二十副緋紫綾紬二百疋綵色綾一百疋金銀器二百事銀壺瓶五十事酒罇杓一十副帳設錦褥一十領紫綾褥二十領食單四十張食器一千事長幕二十條錦帳十所白氊一百事牀圍二十條䲭袋繡墩一百口宴設音樂篇第六十二經曰雲上於天需君子以飲食宴樂用宣王之惠暢吏士之心古人岀師必犒以牛酒頒賞有序殽席有差以激勵於衆酒酣㧞劍起舞明家角抵代皷呌呼以増其氣絲竹哀怨悽愴征夫感而泣下銳氣沮䘮復安得而用哉酒一人二升二百五十石羊一口分為二十節六百二十五口牛肉代羊肉一人二斤二萬五千斤白米一人五合六十五石五斗薄餠一人兩箇二萬五千箇每一斗麵作二十箇一百五十石饅頭一人一枚一萬二千五百枚一斗麵作三十枚散子一人一枚一萬二千五百枚一斗麵作三十枚用麵四十六石六斗七升蒸餅一人一箇一萬二千五百箇一斗麵作一百枚麵二十五石每麵一斗使油二十二斤餜饠一人一枚一萬二千五百枚一斗麵作八十枚麵一十五石六斗二升五合餻餅一人三合糯米三十七石五斗菜一人五兩二千九百五十斤零四兩羊頭蹄六百二十五具充簽醬羊肚肝六百二十五具并四等充羮鹽三人一合四石一斗六升醬一人半合六石二斗五升醋一人一合一十二石五斗椒五人一合二石五斗薑一十人一兩七十八斤零二兩䓤三人一兩三百九十六斤零十兩隨筵樂例大皷杖皷腰皷破陣樂笛拍板舞劍角抵投石超距蹴踘太白隂經卷五

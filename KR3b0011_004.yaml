body:
  text: 太白隂經卷四唐李筌撰戰具類攻城具篇第三十五經曰善守者藏於九地之下善攻者動於九天之上人所不見謂之九地見所不及謂之九天是故墨榮帶為桓公輸造飛雲之梯無所施其巧所謂善守者敵不知所守守而必固者守其所不攻攻而必取者攻其所不守孫武子曰具器械三月而後成拒城闉三月而後已其攻守器械古今不同今約便事而用之轒轀車四輪車上以繩為脊犀皮䝉之下可十人填隄推之直扺下可以攻掘金木火石所不能及飛雲梯以大木為床床下置六輪上立雙牙有括梯長一丈二尺有四梲相去三尺勢微曲遞互相括飛於雲間以窺城中其上城梯首冠雙轆轤枕城上炮車以大木為床床下安四輪上建雙䏶䏶間橫括中獨立竿首如桔橰狀其竿高下長短大小以城為準竿首以窠盛石大小多少隨竿力所制人挽其端而投之其車推轉逐便而用之亦可埋腳著地而用其旋風四腳亦隨事用之車弩為軸轉車車上定十二碩弩弓以鐡鈎連軸車行軸轉引弩持滿弦掛牙上弩為四衢七衢大箭一鏃長七寸廣五寸箭笴長三尺圍五寸以鐡葉為羽左右各三箭次小於中箭其牙一發諸箭齊起及七百步所中城壘無不崩殞樓櫓亦顛墜尖頭轤以木為脊長一丈徑一尺五寸下安六腳下濶而上尖高七尺可容六人以濕牛皮䝉之蔽人其下畀直扺城下木石金火不能及用攻其城土山城外起土乘城而上鑿通為道行於城下因攻其城每一丈建柱以防崩陷復積薪掛於柱間而燒之柱折城崩板屋以八輪車車上豎高竿竿上安轆轤以繩挽扳屋高五尺方四尺有十二孔四靣列布車可進退圜城而於城中逺望謂之窠車狀如鳥窠木幔以板為幔立桔橰於四輪上懸逼城壘間使趫卒蔽之蟻附而上矢石所不能及火箭以小瓢盛油冠矢端射城樓櫓板屋上瓢敗油散後以燒箭射油散處火立焚復以油瓢續之則樓櫓盡焚雀杏磨杏核中空以艾內火實之繫雀之足薄暮羣雀飛入城壘中棲宿其積聚廬舍須臾火發蜀钁鐡鏨蜀钁短柄也鐡鏨井鏨也守城具篇第三十六經曰善守者藏於九地之下善攻者動於九天之上人所不見謂之九地見所不及謂之九天禽滑釐問墨翟守城之具墨翟答以五十六事皆繁冗不便於用其後韋孝寬守晉州王侃守臺城皆約封胡子伎巧之術古法非不妙然非今之用也今術便於事者如左方浚隍深開濠整也增城增修樓櫓懸門懸木板以為重門突門於城中對敵營自鑿城內為暗門多少臨時令厚五六寸勿穿或於中夜或於敵初來營列未定精騎從突門躍出擊其無備襲其不意塗門扇厚五寸偹火又云塗棧以泥門上木棧棚也積石積炮石大小隨事轉關橋梁為橋梁端著橫括橋以關轉人馬不得渡皆傾水中秦用此橋以殺燕丹積石備石於城上不限多少為妙滚拋石射之長矛刺之樓櫓却敵上建堠樓以板為之跳出樓櫓笓籬戰格於女墻上跳出去墻三尺內著橫括前端安轄以荆栁編之長一丈濶五尺懸安椽端用遮矢石布幔以復布為幔以弱竿橫掛於女墻外去墻七八尺折拋石之勢則矢不復及墻木弩以黃楊柘桑為弩可長一丈二尺徑七尺兩梢三寸以絞車張之發如雷吼以敗隊卒燕尾炬縳葦草為炬尾分兩岐如燕尾狀加油蠟灌之燃火從城上墜下使騎轤木而燒之松明炬以松眀燒之鐡索墜下巡城㸃照恐敵人乘城而上脂油燭燃秉燭於城中四衢要路門戶晨夜不得絶明以備非常行轤常鎔鐡汁舁於城以灑敵人土罐盛汁拋之敵攻城不覺逰火鐡筐盛火以脂蠟鐡索懸墜城下燒孔穴掘城之人灰雜糠粃因風於城上擲之以眯敵人之目因以鐡汁灑之又云眯目因風以糠粃灰擲之使不得施為連梃如打禾枷狀打女墻上敵人義竿如鎗刃有兩岐用義飛雲梯上人鈎竿有鎗兩邊有曲鈎可以鈎物天井敵攻城為地道來反自於地道上直下穿井以邀防之積薪井中加火薰之敵人自然焦灼油囊盛火城上直出火車中囊敗火發地聽於城八方穿井各深二丈令人頭覆戴新瓮於井中坐聽則城外五百步之內有孔城道者並聞於瓮中辨方所逺近鐡菱狀如蒺藜要路水中著以刺之中人馬之足陷馬坑坑長五尺濶一尺深三尺坑中埋鹿角竹籖其坑十字相連狀如鈎鎖覆以芻草葦加以土種草實令生苗䝉覆其上軍城營要路設之拒馬槍以木徑二尺長短隨事十字作孔縱橫安括長一丈鋭其端可塞城門要道人馬不得奔前木柵為敵所逼不及築城壘或山河險勢多石少土不任板築且建木為柵方圓高下隨事淺深埋木根重復彌縫其闕內量長短為閣道外柱外重長出四出為女墻皆泥塗之內七寸又立閣道內柱上布板木為棧立竿為柵上懸門擁墻濠塹拒馬一如城壘法水攻具篇第三十七經曰以水攻者强水因而成勢為源高於城本大於末可以遏而止可以決而流故晉水可以灌安邑汾水可以浸平陽先設水平測其高下可以漂城灌軍浸城敗將也水平槽長二尺四寸兩頭中間鑿馬三池池橫濶一寸八分縱濶一寸深一寸三分池間相去一尺五寸間有通水衢濶三分深一寸三分池各致浮木水濶狹微小於池匡三分上建立齒高八分厚一分槽下為轉關腳高下與眼等以水注之三池浮木齊起眇目視之齊平以為天下凖或十步或一里及至十數里目力所及置照板度竿亦以白繩計其尺則高下丈尺分寸可知也照板形如方扇長四尺二寸黑上二尺白濶三尺柄長一尺方可握度竿長二丈刻作二百寸二千分每寸刻小分其分隨向逺近高下立竿以照板映之眇目視之三桴木齒及照板黑映齊平則召主板人以度竿之尺寸為高下遞相往來尺寸相乘則水源高下可以忖度也火攻具篇第三十八經曰以火佐政者明因天時燥旱營舍茅竹積芻穗軍糧於桔草霜之中月在東壁南翼之夕設五火之具因難風而焚之推月宿法周天三百六十五度四分度之一二十八宿四方分之月二十八日夜一周天行二十八宿一日一夜行一十三度少强者皆以月中氣日月合首為首角十二度亢九度氐十五度房五度心五度尾十八度箕十一度東方七宿共七十五度斗二十六度牛八度女十二度虛十度危十七度營室十六度東壁九度北方七宿共九十八度奎十六度婁十二度胃十四度昴十一度畢十七度觜十一度參十度西方七宿共八十度東井三十三度鬼二度柳十三度星七度張十八度翼十八度軫十七度南方七宿共一百一十度雨水正月中日月合宿營室八度於辰在亥為陬訾於野衛分并州為野於將登明春分二月中日月合宿奎婁十三度於辰在戌為降婁於野魯分徐州於將河魁穀雨三月中日月合宿昴三度於辰在酉為大梁於野趙分冀州於將為從魁小滿四月中日月合宿參四度於辰在申為實沈於野魏分益州於將為傳送夏至五月中日月合宿東井二十五度於辰在巳為鶉尾於野楚分為荆州於將太乙秋分八月中日月合宿亢八度於辰在辰為壽星於野鄭分兖州於將天罡霜降九月中日月合宿氐十四度於辰在卯為大火於野宋分豫州於將大衝小雪十月中日月合宿箕十二度於辰在寅為析木於野燕分幽州於將為功曹冬至十一月中日月合宿斗二十一度於辰在丑為星紀於野吳越分揚州於將大吉大寒十二月中日月合宿虛五度於辰在子為𤣥枵於野齊分青州於將為神后假如正月雨水一日夜半行營室八度至後二日夜半行十三度少強即至東壁五度至後三日夜半行十三度少強即至奎九度順行二十八宿每日夜行十三度少強玉門京曰陪月加日從營室順數即位月宿所在假令正月五日位月加二加五成七從營室數至七宿至畢他皆倣此然東井三十三度觜之一時恐將不定故為通算以决之而用五火之具兵以驍騎夜銜枚縳馬口身負束薪藁草藏火抵賊營一時舉火營中驚亂急而乘之彼靜不亂棄而勿攻火獸以艾蘊火置瓢中瓢開四孔繫野鹿角麞項下舉其尾端望敵營而縱之奔彼草中器敗火發火禽以胡桃剖令空開兩空實艾以繫雞足舉其尾而縱之奔入草中器敗火發火盜選一人勇捷語言服飾與敵同者竊號逐便懷火偷入營中焚其積聚火發乘亂而出火矢以臂長弩射及三百步者以瓢盛火冠矢以數百端候中夜齊射敵營中焚其積聚火發軍亂乘便急攻濟水篇第三十九經曰軍行以大水河溝渠澗無津梁舟楫難以濟渡太公以天艎大船皆朴而不便於事今隨事應變以濟百川浮罌以木縳甕為筏甕受二石力勝一人甕闊五尺以繩鈎聨編槍於其上令形長方前置枝頭後置稍左右置棹槍筏槍十根為一束力勝一人四千一百六十六根四分為一筏皆去鑽刃束為魚鱗以橫而縳可渡四百一十六人半為三筏計用槍一萬二千五百根率渡一千二百五十人十渡則全軍畢濟蒲筏以蒲九尺圍顛倒為束以十道縳之以束槍為筏量長短多小隨蒲之豐儉載人無蒲用蘆葦法亦如蒲筏挾絙以木縳小繩先挾渡水次引大絙於兩岸立大橛急張定絙使人挾絙浮渡大軍畢可為數十道豫多備浮囊以羊渾脫皮吹氣令滿緊縳其孔縳於脅下可以渡也水戰具篇第四十經曰水戰之具始自伍員以舟為車以楫為馬漢武帝平百粵鑿昆明之池置樓船將軍其後馬援王濬各造戰船以習江海之利其船闊狹長短隨用大小皆以米為率一人重米二石則人數可知其楫棹篙櫓絙索沈石調度與長船不殊樓船上建樓三重列女牆戰格旗幟開弩忩矛穴置拋車壘石鐡汁狀如城壘晉龍驤將軍王濬伐吳造大船長二百步上置飛檐閣道可奔車驅馬忽遇暴風人力不能制不便於事然為水軍不可以不設形設勢䝉衝以犀皮革䝉覆其背兩相開掣掉孔前後左右以弩忩矛穴敵不得近矢石不能敗此不用大船務於速進乘人之不備非戰船也鬬艦船舷上設中牆半身牆下開掣掉孔舷五尺又建棚與女牆齊棚上又建女牆重列戰敵人無覆背前後左右樹牙旗幟幡金鼓戰船也走舸亦如戰船也舷上安重牆掉夫多戰卒少皆選勇士精鋭者充往返如飛乘人之不及兼備非常救急之用逰艇小艇以備探候無女牆舷上槳床左右隨艇大小長短四尺床㑹計進回車轉陳其疾如飛虞候居之非戰舫也海鶻頭低尾高前大後小如鶻之狀舷下左右置浮板形如鶻翅其船如風浪漲天免其傾側背上左右張生牛皮為城牙旗金鼓如戰船之制器械篇第四十一經曰工欲善其事必先利其器器之於事如影之隨形響之應聲其相須如左右手故曰器械不精不可言兵五兵不利不可舉事上古包犧氏之時剡木為兵神農氏之時以石為兵尚書砮石中矢鏃黃帝之時以玉為兵蚩尤之時鑠金為兵割革為甲始制五兵建旗幟樹夔鼓以佐軍纛六面大將軍中營建出引六軍古者天子六軍諸侯三軍今天子一十二衛諸侯六軍故有六纛以主之門旗二面色紅八幅大將軍牙門之旗出引將軍前列門槍二根以豹尾為刃榼出居紅旗之後止居帳前左右建立五方旗五面各具方色大將營中建出隨六纛後在營亦於六纛後建嚴警鼓一十二面大將營前左右行列各六面在六纛角一十二枝以代金隊旗二百五十面尚色圖繪於本陳同五副認旗二百五十面尚色圖繪與諸隊不同各自為識認出居隊後恐士卒交雜陳將門旗各任所色不得紅恐紛亂大將軍陳將鼓一百二十面臨時警敵所用甲六分七千五百領戰袍四分五十領槍十分一萬二千五百條兵縛㭖牛皮牌二千五面二分馬軍以團牌代四分支弩四分弦三分副箭一百分弦三付箭三十六枝弓一萬二千五百張弦七千五百條箭二十五萬條弓十分弦三副箭三十六枝弓一萬二千五百張弦三萬七千五百條箭三十七萬五千枝射甲者五萬枝射生􅀈箭二萬五千枝長垜箭弓袋胡鹿張弓袋並十分一萬二千五百副佩刀八分一萬口陌刀二分二千五百口棓二分二千五百張馬軍及陌刀並以啄鎚斧鉞齊四分支搭索二分二千五百條馬軍用軍裝篇第四十二經曰軍無輜重則舉動皆闕士卒以軍中為家至以錐刀不可缺驢六分七千五百頭鞍絡自副幕一萬二千五百口竿梁釘橛鎚自副鍋一分一千二百五十乾糧十分一人一斗二升一軍一千五百石麩袋十分一萬二千五百口韋皮縫可繞腰受一斗五升馬盂十分一萬二千五百口皆堅木為之或熟之三斗冬月可以暖食刀子銼子鉗子鑽子藥袋火石袋鹽袋解結錐礪石各十分一十一萬一千五百事麻鞋五十分三萬七千五百領緉攤子􅀈􅀈􅧣子各十分三萬七千五百事袴帑抹額六帶帽子氊帽子各十分六萬二千五百事氊床十分一萬二千五百領皮裘皮袴各三分七千五百領或作或蕃兵用桞罐栲栳各三分五千口皮囊袋亦得鍬鐝鎚斧鋸鑿各二分一萬二千五百事鐮四分五千張切草二分二千五百張布行槽一千二百五十具大小胡瓢二分二千五百枚牧馬軍鞍轡革帶十分三萬七千五百具人藥一分三黃丸水解散瘧痢藥金瘡刀箭藥等五十貼披氊披馬氊引馬索各十分計三萬七千五百事軍馬無幕故以披氊代插捷十分一萬二千五百具絆二十分二萬五千條皮毛連枝中半皮條三十分三萬七千五百條備收賊雜使右各隊隊備辦公廨軍裝並須賫行貯備使令勿臨時有闕太白隂經卷四

body:
  text: 太白隂經巻二唐李筌撰人謀下善師篇第十一經曰兵非道德仁義者雖伯有天下君子不處周德既衰諸侯自作禮樂專征伐始於魯隱公齊以技擊强魏以武卒奮秦以銳士勝說者以孫吳為宗惟荀卿明於王道而非之謂齊之技擊是亡國之兵魏之武卒是危國之兵秦之鋭士是干賞蹈利之兵至於齊桓晉文之師可謂入其域而有節制矣故齊之技擊不可以遇魏之武卒魏之武卒不可以値秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陣善陣者不戰善戰者不敗善敗者不亡黄帝獨立於中央而勝四帝所謂善師者不陣也湯武征伐陳師誓衆放桀擒紂所謂善陣者不戰也齊桓南服强楚使貢周室北伐山戎為燕開路所謂善戰者不敗也楚昭王遭闔閭之禍國滅出亡父兄相與奔請救秦人出兵楚王反國所謂善敗者不亡也凡兵所以存亡繼絕救亂除害故伊吕之將子孫有國與殷周並至末代茍任詐力貪殘孫吳韓白之徒皆身被刑戮子孫不傳於嗣蓋兵者凶器戰者危事隂謀逆德用凶器非道德忠信不能以兵定天下之灾除兆民之害貴和篇第十二經曰先王之道以和為貴貴和重人不尚戰也春秋左傳曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖君之衆無所用也是故晉悼公使魏絳和戎以正諸夷八年之間九合諸侯如樂之和無所不諧羗戎亦歸晉魏公内不侵不叛之臣於是有瞰之師譬如捕鹿晉人犄之戎人角之有道之主能以德服人有仁之主能以義和人有智之主能以謀勝人有權之主能以勢制人戰勝易和勝難語曰先王耀德不觀兵戢而時動動則威觀則玩玩則無震故有衣冠之㑹未嘗有歃血之盟有兵車之㑹未嘗有戰陣之事兵者不祥之器不得已而用之古先帝王所以舉而勝人成功出於衆者先文德以懷之不服飭玉帛以㗖之㗖之不來然後命士將練車馬鋭甲兵攻其無偹岀其不意所謂叛而必討服而必柔既懷既柔可以示德書曰戒之用休董之用威夫如是則四夷不足吞八蠻不足庭也廟勝篇第十三經曰天貴持盈不失隂陽四時之紀綱地貴定傾不失生長均平之土宜人貴節事調和隂陽布告時令事來應之物來知之天下盡其忠信從其政令故曰天道無灾不可先來地道無殃不可先昌人事無失不可先伐四時相乘水旱愆和冬雷夏霜飛蟲食苗天灾也山崩川涸土不稼穡水不潤下五葉不樹八穀不成地殃也重賦苛政高臺深池興役過差縱酒荒色逺忠聼佞窮兵黷武人失也必視天灾而覩地殃傍觀人失不則天不可動師不法地不可行征伐不和於人不可成天贊其時地資其財人定其謀靜見其陽動察其隂先觀其迹後知其心所謂勝兵者先勝而後求戰敗兵者先戰而後求勝故曰未戰而廟算勝者得算多也未戰而廟算不勝者得算少也多算者勝少算者不勝而况於無算乎以此觀之勝負易見矣沈謀篇第十四經曰善用兵者非信義不立非隂陽不勝非竒正不列非詭譎不戰謀藏於心事見於迹心與迹同者敗心與迹異者勝兵者詭道也能而示之不能用而示之不用心謀大迹示小心謀取迹示與感其直疑其詐而詐不決則强弱不分湛然若𤣥隂之無象淵然如滄海之不測如此則隂陽不能算鬼神不能知術數不能窮卜筮不能占其况於將乎夫善戰者勝敗生於兩陣之間其謀也䇿不足聽其勝也形不足觀能言而不能行國之寶能行而不能言國之用故曰至士不說至兵不言微乎神乎故能通天地之理備萬物之情是故貪者利之使其難厭強者卑之使其驕矜自用則忠臣廢擕貳則謀臣去周文離商而商受殺勾踐卑吳而夫差戮漢高離楚而項羽亡是故屈諸侯者以言役諸侯者以策夫善用兵者攻其愛敵必從擣其虚敵必隨多其方敵必分疑其事敵必備從隨不得守城分備不得併兵則我逸而敵勞敵寡而我衆夫以逸擊勞者武之順以勞擊逸者武之逆以衆擊寡者武之勝以寡擊衆者武之敗能以逸擊勞以衆擊寡吾所以得全勝矣夫竭三軍氣奪一將心度萬人力斷千里糧者不在武夫行陣之勢而在智士權算之中柔兮弱兮卷之不盈懷袖沈兮宻兮舒之可經寰海五寸之鍵能制闔開方寸之心能易成敗知周萬物而不殆曲成萬物而不遺順天信人察始知終則謀何患乎不從哉子卒篇第十五經曰古者用人之力歲不過三日藉歛不過什一公劉好貨居者有積倉行者有裹糧大王好色内無怨女外無曠夫文王作刑國無寃獄武王行師士樂其死古之善率人者未有不得其心而得其力者也未有不得其力而得其死者也故國必有禮信親愛之義然後人以飢易飽國必有孝慈廉恥之裕然後人以死易生人所以守戰至死而不衰者上之所施於人者厚也上施厚則人報之亦厚且士卒之於將非有骨内之親冒鋒鏑突干刃死不旋踵者以恩信養之禮恕導之小惠漸之如慈父母育愛子也故能救其險厄拯其塗炭卑身下士濟免甘苦親臨疾病寒不衣裘暑不操扇登不乘馬雨不張蓋軍幕未便將不言坐軍井未達將不言渇妻子縫補於行間身分功於作役簞醪之饋必投於河挾纊之言必巡於軍是以人喜金鐸之聲厚卒如嬰兒可與之赴深溪視卒如愛子可與之俱死厚而不能使愛而不能令亂而不能理譬如驕子不可用也是故令之以文齊之以武是謂必取語曰夫妻諧可以攻齊小僕怒可以攻魯王翦李牧吳起田穰苴竟以此術而兵强於諸侯選士篇第十六經曰統六軍之衆將百萬之師而無選鋒渾而雜用即智者無所施其計辯者無所施其説勇者無所施其奮力者無所著其壯無異獨行中原亦何取於勝負哉故孫子曰兵無選鋒曰北夫選士有以賞賞得其進用士有以刑刑懼則退古之善選士者懸賞於中軍之門有深沈謀慮出人表者以上賞而禮之名曰智囊之士有辭縱禮横飛箝捭闔能移人之性奪人之心者以上賞而禮之名曰辯説之士有得敵國君臣門閭請謁之懽心者以上賞而禮之名曰鄉導之士有制造五兵攻守利器竒變譎詭者上賞得而厚之名曰伎巧之士有引五石之弓矢貫重鎧戈矛劍㦸便於利用陸搏犀兕水攫黿鼉佻身捕虜搴旗摭鼓者上賞得而撫之名曰猛毅之士有立乘奔馬左右超忽踰越城堡出入廬舎而亡形迹者上賞得而聚之名曰趫捷之士有徃反三百里不及夕者上賞得而聚之名曰疾足之士有力負六百三十斤行五十歩者上賞四百二十斤次賞得而聚之名曰巨力之士有知五行運三式多言天道譎説隂陽者下賞得而存之名曰伎術之士夫十士之皆盡其材任其道計謀使智囊之士談説使辯説之士離親間疏使間諜之士深入諸侯之境使鄉導之士建造五兵使伎巧之士摧鋒捕虜守危攻强使猛毅之士掩襲侵掠使趫㨗之士探報計期使疾足之士破堅陷剛使巨力之士託愚感癡使伎術之士此謂任才之道選士之術也三王之后五伯之辟得其道而興失其道而亡興亡之道不在人主聰明而在其選能之當其才也勵士篇第十七經曰激人之心勵士之氣發號施令使人樂聞興師動衆使人樂戰交兵接刃使人樂死其在以戰勸以賞勸戰賞以勵士水石無心猶可危而動安而靜况於勵士乎古先帝王伯有天下戰勝於外班師校功集衆於中軍之門上功賜以金章紫綬錫以錦綵衣以繒帛坐以重裀享以太牢飲以醇酒父母妻子皆賜紋綾坐以重席享以少牢飲以酎酒大將軍捧賜偏將軍捧觴大將軍令於衆將曰戰士某乙等奮不顧身勇敵萬夫斬元戎之首搴大將之旗功高於衆故賜上賞子孫後嗣長稱卿大夫之家父母妻子皆受重賞牢席有差衆士咸知次功賞其銀章朱綬文綾之衣坐以重席享以少牢飲以酎酒父母妻子賜以繒帛坐以單席享以雞豚飲以釃酒偏將軍捧賜下將軍捧觴大將軍令於衆曰戰士某乙等勇冠三軍功經百戰斬驍勇之首搴虎豹之旗功出於人故賜以中賞子孫後嗣長為勲給之家父母妻子皆受榮貴牢席有差衆士咸知下功賞以布帛之衣坐以單席享以雞豚飲以釃酒父母妻子立而無賞坐而無席下將軍捧賜卒捧觴大將軍令於衆曰戰士某乙等戮力行間劬勞歲月雖無搴旗斬將實以䟦渉疆場錫以下賞子孫後嗣無所庇諸父母妻子不及坐享衆士咸知令畢命上功起再拜大將軍讓曰某乙等忝列王臣敢不盡節有愧無功叨受上賞大將軍避席曰某乙等不徳謬居師長賴爾之功梟懸兇逆盛績美事是用上賞退而復坐命次功再拜上功上功曰某乙等無謀無勇遵師長之命決勝負於一時無退生之辱身受殊賞上光父母下及妻子其勉旃退而復坐命下功再拜次功次功坐受曰某乙等少猛寡毅遵師長之命決勝負於一時身受次賞上光父母下及妻子其勉旃下功退而復坐夫如是以勵之一㑹則鄉勉黨里勉隣父勉子妻勉夫二㑹縣勉州朋勉友三㑹則行路相勉聞金革之聲相踐而出隣無敵國亦無堅城士何患乎不勵哉刑賞篇第十八經曰有虞氏畫衣章服以刑輔繆而姦不犯其人醇湯武鑿五刑傷四肢以繆輔刑而姦不止其人滛有虞非仁也湯武非暴也其道異者時也古善治天下者不賞仁賞仁則爭為施而國亂不賞智賞智則爭為謀而政亂不賞忠賞忠則爭為直而君亂不賞能賞能則爭為巧而事亂不賞勇賞勇則爭為先而陣亂夫蒞衆以仁權謀以智事君以忠制物以能臨敵以勇此五者士之常賞其常則致爭致爭則致亂則非刑不治故賞者忠信之薄亂之所由生刑者忠信之戒禁之所由成刑多而賞少則無刑賞多而刑少則無賞刑過則無善賞過則多奸王者以賞禁以刑勸求過而不求善而人自為善賞文也刑武也文武者軍之法國之柄明主首岀庶物順時以撫四方執法而操柄據罪而制刑按功而設賞賞一功而千萬人悅刑一罪而千萬人懼賞無私功刑無私罪是謂軍國之法生殺之柄故曰能生而能殺國必強能生而不能殺國必亡又曰能生死而赦殺者上也刑賞之術無私於人賞公於世以為道其道也非自立於堯舜之時非自逃於桀紂之朝用得之而天下治用失之而天下亂治亂之道在於刑賞不在於人君過此以徃雖彌綸宇宙經絡萬品生殺之用胥是道也地勢篇第十九經曰善戰者以地强以勢勝如轉圓石於千仞之深溪者地勢然也千仞者地之險圓石者轉之勢地無千仞而有圓石置之窳塘之中則不復轉地有千仞而無圓石投之方稜偏匾則不能復移地不因險不能轉圓石石不因圓不能赴深溪故曰兵因地而强地因兵而固善用兵者高陵勿向背丘勿迎負隂抱陽養生處實則兵無百病是故諸侯自戰於其地名曰爭地彼我可徃名曰交地三屬諸侯之國名曰衢地深入背人城邑名曰重地山林沮澤險阻名曰圮地出入迂隘彼寡可以擊吾衆名曰負地疾戰則存不戰則亡名曰死地故散地無戰輕地無陣爭地無攻交地無絕衢地合交重地則掠圯地則行負地則謀死地則戰是故城有所不攻計不合也地有所不受未見利也君命有所不聴不便事也凢地之勢三軍之權良將行之智將遵之而旅將之欲幸全勝飛龜舞蛇未之有也兵形篇第二十經曰夫兵之興也有形有神旗幟金革依於形智謀計事依於神戰勝攻取形之事而用在神虗實變化神之功而用在形形粗而神細形無物而不鑒神無物而不察形誑而惑事其外神宻而圓事其内觀其形不見其神不見其事叅之拽柴揚塵形之衆也減竈㓕火形之寡也勇而無剛當敵而速去形其退也斥山澤之險無所不至形其進也油幕冠樹形其强也偃旗卧鼔寂若無人形其弱也故曰兵形象陶人之埏土鳬氏之冶金為方為圓或鐘或鼎金玉無常性因工以之名戰陣無常勢因敵以為形故兵之極至於無形則間諜不能窺智畧不能謀因形而措勝於衆衆不能知人皆知我所以勝之形莫知吾所以制勝之形形不因神不能為變化神不因敵不能為智謀故水因地而制形兵因敵而制勝也作戰篇第二十一經曰昔之善戰者如轉木石木石之性圓則行方則止行者非能行而勢不得不行止者非能止而勢不得不止夫戰人者自鬬於其地則散投之於死地則戰散者非能散勢不得不散戰者非能戰勢不得不戰行止不在於木石而制在於人散戰不在於人而制在於制勢而戰人也夫未見利而戰雖衆必敗見利而戰雖寡必勝利者彼之所短我之所長也見利則起無利則止見利乘時帝王之資故曰時之至間不容息先之則太過後之則不及見利不失遭時不疑失利後時反受其害疾雷不及掩耳卒電不及瞑目赴之若驚用之若狂此因利之戰人也夫戰者左川澤右丘陵背高向下處生擊死此平地之戰人也逼敵無近於水彼知不免致死拒我困獸猶鬬蜂蠆有毒况於人乎令其半濟而擊之前者知免後者莫之蔑有鬬心敵逆水而來迎之於水内此水上之戰人也左右山陵溪谷險狹與敵相遇我則金皷蔽山旗幟依林登高逺斥岀没人馬此山谷之戰人也勢利者兵之便山林平陸者戰之地夫善用兵者以便勝以地强以謀取此勢之戰人也如建瓴水於高宇之上砉然而無滯霤又如破竹數節之後迎刃自解無復著乎攻守篇第二十二經曰地所以養人城所以守地内得愛焉所以攻守不足攻有餘力不足者守力有餘者攻攻人之法先絕其愛使無外救料城中之粟計人日之費糧多人少攻而勿圍糧少人多圍而勿攻力未屈粟未盡城尚固而支者攻之至也力屈粟殫城壞而不支者守之至也夫守城之法以城中壯男為一軍壯女為一軍男女老弱為一軍三軍無使相遇壯男遇壯女則費力而奸生壯女遇老弱則老使壯悲弱使强憐悲憐在心則使勇人更慮壯夫不戰故曰善攻者敵不知所守善守者敵不知所攻微乎微乎至於無形神乎神乎至於無聲故能為敵之司命行人篇第二十三經曰國君擇日登壇拜大將軍繕甲兵具卒乘出則破人之國敗人之軍殺人之將虜人之俘贏糧萬里行於敵人之境而不知敵人之情將之過也敵情不可求之於星辰不可求之於鬼神不可求之於筮卜而可求之於人昔商之興也伊尹為夏之庖厨周之興也吕望為商之漁父秦之帝也李斯為山東之獵夫漢之王也韓信為楚之亡卒魏之伯也荀彧為袁紹棄臣晉之禪也賈充仕魏魏之起也崔浩家晉故七君用而帝天下夫賢出奔必有佞臣持君之衡是以度佐有扈狐功專驩兠成均權三苗推移佞桀崇侯詔紂優旃惑晉故曰三仁去而商􅇕二老歸而周熾子胥死而吳亡范蠡存而越伯五羖入而秦喜樂毅岀而燕懼將能収敵國之人而任之以當其材戰何患乎不克故曰羅其英敵國傾羅其雄敵國亡他山之石可以攻玉夫行人之用事有二一曰因敵國之人來觀釁於我我高其爵重其禄察其辭覆其事實則任之虚則誅之任之以鄉導二曰吾使人觀敵國之君臣左右執事孰愚中外近人孰貪孰亷舍人謁者孰君子孰小人吾得其情因而随之可就吾事夫三軍之重者莫重於行人三軍之密者莫密於行人行人之謀未發有漏與告者皆死謀發之日削其藁焚其草金有口木有舌無使内謀之泄若鷹隼之入重林無其蹤如逰魚之赴潭無其跡離婁俛首師曠傾耳不聆其聲微乎微乎與纎塵俱飛豈飽食醉酒恃力輕合之將而得見行人之事哉鑒才篇第二十四經曰人禀元氣所生隂陽所成淳和平淡元氣也聰明俊傑隂陽也淳和不知權變聰明不知至道夫人柔順安恕失於决斷可與循節難於權宜強悍剛猛失於猜忌可與渉難難於持守貞良慎畏失於狐疑可與樂成難於謀始清介亷潔失於扄執可與立節難於通變韜晦沈靜失於遲迴可與深慮難於應捷夫聰明秀出謂之英膽力過人謂之雄英者智也雄者力也英不果敢雄不能智謀故英得雄而行雄得英而成夫人有八性不同仁義忠信智勇貪愚仁者好施義者好親忠者好直信者好守智者好謀勇者好决貪者好取愚者好矜人君合於仁義則天下親合於忠信則四海賔合於智勇則諸侯臣合於貪愚則受制於人仁義可以謀縱智勇可以謀横縱成者王横成者伯伯王之道不在於兵强士勇之際而在於仁義智勇之間此亦偏才未足以言大將軍若夫能柔能剛能翕能張英而有勇雄而有謀圓而能轉環而無端智周萬物而道濟於天下此曰通才可以為大將軍矣故曰將者國之輔輔周則國强輔隙則國弱是謂人之司命國家安危之主不可不察也明主所以擇人者閱其才通其用鑒其貌厚其責察其心貞其明居高而逺望徐視而審聼神其形聚其精若山之高不可極若泉之深不可測然後審其賢愚以其辭擇其智勇以任事及其可任之夫擇聖以道擇賢以德擇智以謀擇勇以明擇貪以利擇奸以隙擇愚以危事或同而觀其道或異而觀其德或權變而觀其謀或攻取而觀其勇或臨財而觀其利或捭闔而觀其間隙或恐懼而觀其安危故曰欲求其本察其性欲求其古察其今先察而任者昌先任而察者亡昔市偷自育於晉晉察而用之勝楚伊尹自育於湯湯察而用之放桀智能之士不在遠近仁人不因困厄無以廣其德智士不因棄時無以舉其功王者不因絕亡無以立其義覇者不因强敵無以遺其患明主任人不失其能直士舉賢不離於口無萬人之智者不能據於萬人之上故曰不知軍中之事而同軍中之政者則軍惑矣不知三軍之權而同三軍之任者則軍士疑矣既疑且惑則諸侯之難至矣夫如是則君不虗王臣不虗貴所謂君道知臣臣術知事者也太白隂經卷二

body:
  text: 太白隂經卷六唐李筌撰陳圖總序第六十三經曰黃帝設八陳之形車箱洞當金也車工中黃土也鳥雲鳥翔火也折衝木也龍騰却月水也鴈行鵝鶴天也車輪地也飛翼浮沮巽也風后為演握竒圖云以正合以竒勝或合而為一或離而為八聚散之勢節制之度復置虛實二壘力牧以創營圖其後秦由余蜀將諸葛亮並有戰圖以教人戰夫營壘教戰有圖士卒知進止識金鼓其應敵戰陳不可預形故其戰勝不復而應形無窮兵形象水水因地而制形兵因敵而戰勝能與敵變化而取勝者謂之神則其戰陳無圖明矣而庸將以教習之陳為戰敵之陳不亦謬乎風后握竒壘圖篇第六十四經曰自風后至於太公俱用此法古之握竒文不滿尺理隱難明其范蠡樂毅張良項籍韓信黥布皆用此法得其糟粕而霍光公孫𢎞崔浩亦採其華未盡其實今以八陳握其人數為壘班布守地闊狹頃畝列之如後圖原闕握竒外壘一軍一萬二千五百人以十人為一火一千二百五十火幕亦如之幕長一丈六尺舍十人人守地一尺六寸十以三為竒以三千七百五十人為竒兵餘八千七百五十人分為八陳陳有一千九十三人七分五銖守地一千七百五十尺八陳積率為地一萬四千尺率成三百三十步餘二尺積率成六里餘一百七十三步二尺以壘四面乘之一面得地一里餘二百二十二步二尺壘內得地一十四頃一十七畞餘一百九十七步四尺六寸六分以為外壘天陳居乾為天門地陳居坤為地户風陳居巽為風門雲陳居坎為雲門飛龍居震為飛龍門虎翼居兑為虎翼門鳥翔居離為鳥翔門蛇盤居艮為蛇盤門天地風雲為四正龍虎鳥蛇為四竒乾坤艮巽為闔門震離兑坎為開門有牙旗遊隊列其左右偏將軍居壘門內禁出入察奸詐壘外有遊軍定有端前有衝後有軸四隅有輔以備非常中壘以三千七百五十人為中壘守地六千尺積尺得二里餘二百八十步以中壘四面乘之一面得地二百五十步壘內有地兩頃餘一百步正門為握竒大將軍居之六纛五麾金庫鼓藏輜重居中壘太白營圖篇第六十五經曰參七星伐三星連肩足十星為十將軍西方白虎宿也主殺伐此星出而天下秋草木搖落有若軍威故兵出而法焉圖原闕一將一千人十將一萬人幕千人守地一萬六千尺積尺得二千六百六十六步餘四尺積步得七里餘一百四十六步四尺以營四面乘之一面得地一里餘三百六十步四尺營內有地一十八頃七十畞餘一百四十三步五尺三寸三分地主居坎為地主門和德居艮為和德門髙叢居震為髙叢門大炅居巽為大炅門大威居離為大威門大武居坤為大武門大蔟居兑為大蔟門陰德居乾為陰德門四仲為開門四維為闔門外置牙旗遊隊四維門置鋪偏將居壘門內以禁出入察奸邪十將幡旗圖㑹五色五行列右一將行得水黑幡幟旗圖熊額白腳青右二將行得火赤幡幟旗圖鶚額白腳黃右三將行得木青幡幟圖熊額白腳青右四將行得金白幡幟旗圖狼額白腳黑右五將行得土黃幡幟旗圖虎額青腳白左一將行得水黑幡幟旗圖熊額青腳赤左二將行得火赤旙幟旗圖鶚額青腳黃左三將行得木青幡幟圖熊額青腳赤左四將行得金白幡幟旗圖狼額青腳黑左五將行得土黃旙幟旗圖虎額青腳白中營二千人為左右決勝軍大衛五百為二百五十人守地四千尺積尺得六百六十六步餘四尺積步得一里餘三百二十步四尺以營四面乘之一面得地一百六十八步餘四尺其中營小每面加四十三步一尺三寸三分通成二百二十二步一尺三寸三分每幕相去一尺五寸四分營內有地二頃四畞餘一百五十七步一尺五寸九分休門主一居子生門主二居艮傷門主三居卯杜門主四居巽景門主九居午死門主二居坤驚門主七居酉開門主六居乾右八門四維四仲唯開景門致大將將軍旗纛金鼓如握竒法偃月營圖篇第六十六經曰偃月營形象偃月皆背山岡面波澤輪逐山勢隨面直形地窄小狹之所下營圖原闕偃月外營常以四六分幕一萬人以六千人守地九千六百尺積尺得一千六百步積步得四里餘一百六步為營輪四千人守地六千四百尺積尺得一千六十步餘四尺積步得二里餘三百四十六步四尺為弦弦致三門每門相去三百五十五步一尺五寸五分營內有地一十八頃八十畞餘五十八步四尺右置上弦門中置偃月門左置下弦門偃月中營以二千五百人守地四千尺積尺得六百六十步餘四尺積步得一里三百步餘四尺五寸四分每幕中兩廂置土馬一十二匹大小如常馬備真鞍令士卒擐甲槖弓矢佩刀劒持矛盾左右上下以習騎射隂陽隊圖篇第六十七經曰陽遁起一至九隂遁起九至一隊有五十人一人為長一隊九人不失四十五人之數卒間容卒相去二步隊間容隊相去一十八步前後一十步其隊相連前後亦如之黃帝曰陳間容陳隊間容隊曲間容曲也圖原闕一隊布地三十六步一陳二十二隊布地七百九十三步方圓斜曲長短皆如之大長不預教習而支器仗亦料其分數之內甲三十領六分戰袍二十領四分槍五十桿十分牌十面二分弩十張二分陌刀十張二分箭四十副八分佩刀四十口八分棓十具六分右守用隂隊左攻用陽隊矛盾弓布置各有行列前後隂陽不同教旗圖篇第六十八經曰春秋末並為戰國增講武之禮以為戲樂用相誇競而秦更名為角抵故國雖大好戰必亡天下雖安妄戰必危故春搜秋獮夏苖冬狩振旅理兵所以不忘戰也宣尼曰不教民戰是謂棄之今邊軍更名曰教旗使士卒識金鼓列旗幟知行列諳部分乃一軍之節制也圖原闕凡教旗於平原髙山大將軍居其上南向左右各置鼓一十二面角一十二具各樹五色旗六纛居前旌旗次之監軍御史禆副左右衙官騎隊如偃月形為候騎下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命十將左右決勝將總十二將一萬二千人兵刃精新甲馬旗幟分為左右廂各以兵馬使為長班布其次陳間容陳隊間容隊曲間容曲以長參短以短參長回車轉陳以前為後以後為前進無奔迸退無趨走紛紛紜紜鬭亂而不可亂渾渾沌沌形圓而不可敗者竒正是也進止有度疾徐有節以正合以竒勝聽音望麾乍合乍離於是三令五申白旗㸃鼓音動則左右相齊合朱旗㸃角音動則左右相齊合坎離子午之地左廂陽向而旋右廂隂向而旋左右各復本位白旗掉鼓音動左右雲蒸鳥散彌川絡野然而不失部隊之踈密朱旗掉角音動左右各復本位前後左右無差尺寸經曰散則法天聚則法地如此三合而離離三聚而三散不如法者吏士之罪可從軍令於是大將軍出五彩旗一十二面各樹於左右陳前每旗選壯勇士五十人守旗選壯勇士五十人奪旗右廂奪左廂左廂奪右廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞負罰離合之勢聚散之形勝負之理賞罰之信因是而教之草教圖篇第六十九經曰古之諸侯畋獵者為田除害上以供祭祀下以習武事太古之時人食鳥獸之肉衣鳥獸之皮後代人民侵多禽獸寡少衣食不足於是神農教其播植導其紡績以代鳥獸之命自是以後禽獸盈山林害禾稼人民苦之於是王公秋冬無事教習畋獵簡練兵革奮揚威武以戒非常季冬之月獵日太隂用事萬物畢成蟄蟲以伏乃具卒乘從禽於山澤以教兵令知部分進退之儀矣圖原闕一人守圍地三尺一十二將守地三萬六千尺得步六千積步得一十五里餘六千步圍中徑闊得地五里餘二十步以左右決勝將為校頭其次左右將各主士伍為行列皆以金鼓旌旗為節制其初起圍張翼隨山林地勢無逺近部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其步卒槍幡守圍有漏禽獸者坐守圍吏人獸公之獸私之以觀進止教弩篇圖第七十經曰弩者怒也言其聲勢威嚮如怒故以名其力也穿剛洞堅自近及逺古有黃連百竹八擔雙弩之名今有絞車弩射七百步攻城拔壘之擘弩射三百步步戰用之馬弩射二百步馬戰用之弩張遲臨敵不過一二發所以戰陳不便於弩非弩不利於戰而將不明於弩也夫弩不離於短兵當别為隊攢箭注射則前無立兵對無橫陳復以陳中張陳外射畨次轉回張而復出射而復入則弩不施聲敵無薄我置弩必處其髙爭山奪水守隘塞口破驍陷陳果非弩不利也圖原闕張弩後左廂丁字立當弩八字立髙揎手垂衫襟左手承撞右手迎上當心看張張有闊狹左䏶右轉還復當心安箭髙舉箭賊若逺髙擡弩頭賊若近平身放左右有賊回身放賊在髙處挈腳放箭訖唱殺却掣物蝎尾覆弩還著也合而為一陳篇第七十一經曰從一陳之中離為八陳聽音望麾以出四竒飛龍虎翼鳥翔蛇盤為四竒陳天地風雲為四正陳夫善戰者以竒勝以正合相生如循環之無端孰能窮之竒為陽正為隂隂陽相薄而四時行焉竒為剛正為柔剛柔相得而萬物成焉竒正之用萬物無所不勝焉圖原闕離而為八陳圖篇第七十二經曰風后演握竒圖自一陳之中分為八陳天有衝或圓而布色帝曰小則圓利為主色尚𤣥為乾圖原闕地陳方布利為客色黃為坤圖原闕風附於天風象其形鋭首利為客色尚赤為巽圖原闕雲附於地上太公曰左右相向是也其形鋭首利為客色尚白為地圖原闕飛龍形屈曲似龍利為主色上𤣥下赤為震圖原闕虎翼居中法翼而進其形猛利為主色上黃下赤為兑圖原闕鳥翔太公曰突擊之義是也其形迅急利為客色上𤣥下白為離圖原闕蛇盤太公曰圍之義也其形宛轉利為主色上黃下赤為艮圖原闕太白隂經卷六

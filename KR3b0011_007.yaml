body:
  text: 太白隂經卷七唐李筌撰祭文書藥方總序經曰古者天子望於山川遍於羣神諸侯祭其封內其觸石吐雲之山川神祗皆祭并所過名山大川福及生人神祗爾雅云既類既禡師祭也既伯既禱馬祭也師初出則禡軍之牙門禱馬羣廄蚩尢氏造五兵制旗鼓師出亦祭之其名山大川風伯雨師並所過則祭不過則無妄祠毗沙門神本西方法佛說四天王則北方天王也於于闐城有廟身披甲右手持㦸左手擎化塔祗從羣諸殊形異狀胡人事之往年吐蕃圍于闐吐蕃人夜見金人披髮持㦸行于城上吐蕃衆數千萬盡患瘡疾莫能勝又化黑鼠咬弓弦無不斷絶吐蕃扶病而遁國家知其神乃於邊方立廟元帥亦圖其形旗上號曰神旗出居旗節之前故軍出而祭之至今州縣府多立天王廟也一云昔吐蕃圍安西北庭表奏之救唐𤣥宗曰安西去京一萬二千里八月方到到則無所及矣左右請召不空三藏今請毗沙門天王師至請帝執香爐師誦真言帝忽見甲士前立帝問不空不空曰天王差二子獨捷領兵救安西來辭陛下後安西奏云城東北三十里雲霧中見兵人各長一丈約五六里至酉時鳴鼓角震三百里停二日康居等五國抽兵彼營中有金鼠咬弓弦弩器械並損須㬰北樓天王現身禡牙文篇第七十三維某載歲次某甲某月朔某日某將軍某敢以牲牢之奠告於牙軍之神在昔三皇無師五帝有師所以伐奸凶禦桀鷔定亂存良長蛇流毒寇掠我生聚殘害我邊陲我君恥不祥之器以伐謀為兵愛不戰而屈人借前箸為策遂得東夷貢矢西旅獻獒海澄河宴亦有年矣今負固不庭起蜥逺山桀犬吠堯梟獍狼顧天子授我斧鉞錫我彤弓鑿門分閫使專征伐恭惟乃神翼兹貔武左霹靂右雷公天乙在前太乙在後風雹雨霰尅勝羣醜枹鼓未揮元凶授首惟爾神靈來歆㫖酒禡馬文篇第七十四維某載歲次某甲某月朔某日某將軍某謹以清酌少牢之奠祭爾羣牧馬之神靈古者庖犧氏作服牛乘馬引重致逺以代人勞爾能節齊和鑾舉鼙鼓陷矢石殪奔禽聲嘶而長風始至影滅而浮雲猶見穆滿八駿足跡接於瑶池王良駟馬人事標於天漢國家恩覃無垠光宅有土皇化潛謐凡在蠻邦航海梯山貢金納帛而猶豺狼難厭返首逆鱗學三苖之不共慕九黎之亂德叛而不討何以示戒天子齊壇場拜飛將軍身衛雕戈手執金鼓揮陳雲以出塞乘明月而渡河誓將揮種埋落禽魑摘魁火烈具舉勢踰飄風惟爾馬神使我馬肥風馳電轉龍驟魚奔晶甲霜明草木皆偃飛矢星落江河斡旋一舉成功投我脫甲示不復用休爾于華山之陽而已矣祭蚩尤文篇第七十五維某載歲次某甲某月朔某日某將軍某謹以牲牢之奠祭爾炎帝之後蚩尤之神太古之初人尚敦素拓石為內弦木為弧今乃鑠金為兵割革為甲樹旗幟建鼓鼙為戈矛為㦸楯聖人奄有寰海四征不庭服强畏威伐叛誅暴擊五兵之利為萬國之資皇帝子育羣生義征不惠蠢爾凶狡蟻鬬要荒今六軍戒嚴躬行天罰人之不誅景福來臻使鼉鼓增氣熊旌佐威邑無堅城野罕橫陳如飛霜而捲木拔山而壓卵火烈風掃戎夏大同允我一人之德由爾五兵之功而已祭名山大川文篇第七十六名山文維某載歲次某甲某月朔某日某將軍某謹以清酌少牢之奠敬祭於某山之神惟神聰明正直惡盈福謙亭育黎氓作鎮方土國家天覆地載罔不宅心航海梯山回首內向獨彼凶醜毒害性成滔天虐人窺邊猾夏天階其禍養成其凶皇帝取亂侮亡兼弱攻昧赫斯怒奮電霆雲湧雷轟風卷電掣今則萬騎雲㑹八陳戎裝頓軍峰巒樵蘇林麓天道助順人情好謙天人共棄神鑒孔明何不蒸雲鬱霧飛沙轉石助我軍威全師克獲牲牢匪馨明德惟馨大川文維某載歲次某甲某月朔某日某將軍某謹以少牢敬祭于某川之神惟神植德靈長善利萬物其柔也沉鴻毛纎芥其剛也轉巨石截橫山興波鼓浪隔越華夷避髙就下兵形法焉我君胄有萬國道涵四海伐叛懷逺右文講武是以扶餘肅慎左衽中庭夜郎滇池辮髮役事惟彼凶虜敢干天常負固慿山搖蜂蠆之毒乘危恃險運螳蜋之斧天子授某等之兵士卒與我一心聞鼓有死難之志神居五行之長百瀆之源藏蛟躍龍蒸雲致雨今大軍利涉全師既行惟爾有神尚其吐天吳驅風伯逐鯨魚使波皆漣漪厲有淺清成軍將之事贊天子之威祭風伯雨師文篇第七十七風伯文維某載歲次某甲某月朔某日某將軍某謹以磔犬清酌祭于風伯之神惟神道出地户跡遍天涯東溫而層氷澌散西烈則百卉摧殘鼓怒而走石飛沙翻江倒海安靜則雲屯浪息綻柳開花暢百物以敷蘇使八方而寧謐達庶人之理暢大王之雄國家至道深仁豚魚服信杜絶左袵混一車書海宴河清逺安邇肅惟彼凶孽尚敢憑陵統烏合之衆恃蜂屯之徒險憑蟻壤浮遊朝菌干我天誅非加懲艾何以廓清皇帝道惡殺生鞠養羣品乃威以斧鉞懷以惠和先茅屆途後殿臨境兩軍相見八陳將施惟爾明神號吼䬂􅂒折木偃草使旗旄指敵驚沙走石飛太山之行晝不見于虜目震雷霆之嚮近不聽于虜耳䝉袂僵仆欵我轅門兵不血創而革戎同風而已雨師文維某載歲次某甲某月朔某日某將軍某謹以牲牢之奠致祭于雨師之神惟神薄隂陽而成氣馭風雲而施德威合風雷則禾木盡偃恩覃霧露而卉物敷榮昆陽惡盈蕩新室之衆龜兹順助洗濟凉之師其實善也如此則罰惡也如彼國家大業廣被休德洽如懷生之倫盡荷明德蠢兹奸宄草竊遐荒使謀臣不暇高枕戰士脫甲天子怒目按劒發驍勇誅不道天下士衆雲集星馳氣騰青霄精貫白日熏狡兔穴覆梟鳥巢惟神何不傾湫倒海以助天威蕩冦清讐以張軍勢按劍則日中見斗揮戈而曜靈再晡壯戎軍之氣乃爾神之功祭毗沙門天王文第七十八維某載歲次某甲某月朔某日某將軍某謹稽首以明香淨水楊枝油燈乳粥酥蜜粽餌供養北方大聖毗沙天王之神伏惟作鎮北方護念萬物蕃衆悖逆肆以誅夷如來涅槃委之僧法是以寶塔在手金介被身威凜商秋德融湛露五部鬼神八方妖精殊形異狀襟帶毛羽或三面而六手或一面而四目瞳顔如藍磔髮似火牙嵯岈而出口瓜鈎兜而露骨視雷霆喘雲雨吸風飈噴霜雹其叱咤也豁大海拔須眉摧風輪粉鐵圍並隨指呼咸類驅䇿國家皈依釋教護法肇魔萬國歸心十方面向惟彼黠虜尚敢昏迷肉食邊毗漁獵亭障天子出師問罪要荒天王宜發大悲之心軫護念之力助我甲兵戮彼凶孽使刁斗不驚太白無芒雖事捷邊將而功歸於天王哉捷書露布篇第七十九某道節度使牒上中書門下破逆賊某乙下兵馬使告捷事得都知兵馬使某牒稱今月某日某時於某山川探見賊與戰俘斬略盡今乘勝逐北未暇㸃算殺獲生級器械牛馬續即申上者天威逺播狂寇敗亡將盡煙塵同增慶抃謹差某乙馳驛告捷具狀牒上中書門下謹牒某年某月某日官某牒判官某官某行軍司馬某使某官某道節度使奏破某賊露布事拔逆賊某城若干所生擒首領某人若干斬大將若干級斬首若干級獲賊馬若干匹甲若干領旗若干面弓弩若干張箭若干隻搶牌若干面衣裝若干事件應有得者具言之中書門下尚書兵部某道節度使某官臣某言臣聞黃帝興涿鹿之師大舜有三苗之役雖道髙於千古猶不免于四征我國家德過唐虞功格區宇蠢斯狂冦昏迷不恭犬羊成羣犯我亭障臣今令都知兵馬使某官某都統馬步若干人為虞候某官某領强弩若干人為竒兵設伏虞候總管某官某領陌刀若干人為後節度副使某官某領蕃漢子弟若干人為中軍遊騎以某月日時于某山川與賊大軍相值埃塵漲空旌旗蔽野臣令都知兵馬使官某大將軍當其衝左右虞候兩為翼勢欲戰酣伏兵竊發賊衆懼駭虞候某陌刀掩至白刃霜飛紅血星流從寅至午經若干陳所有殺獲具件如前人功何能天力是贊謹差先鋒將某官某奉露布以聞特望宣布中外用光史册臣某頓首謹言某年月日掌書記某官某上治人藥方篇第八十經曰藥者和草木之性治人寒溫燥濕之病道達經脉通理三關九候五臟六腑扶衰補虛人氣鬱蒸其病或瘟㾮瘧疾痢金瘡墜馬所以隨軍備急療時行熱病方梔子二十枚乾姜五兩茵陳三兩升麻三兩大黃五兩芒硝五兩右六味為末飯汁飲調服空心三錢匕須㬰利不利則暖粥投之利多則漿水飯止之愈隂陽毒不可服療赤班子瘡梔子二十枚柴胡三兩黃苓三兩芒硝五兩右為細末飯飲調下三錢匕以利為愈療天行疫方瓜蔞四十九粒丁香四十九粒赤小豆四十九粒右為末井花水空心調服方寸匕次兩鼻中各搐此散一大豆許須臾鼻出黃水吐利良久乃愈療瘧疾方鱉甲三兩生常山二兩甘草二兩松羅二兩右為末用烏梅煎湯調服方寸匕日二服少加之以吐為愈如未瘥者服當歸六味散桂心三兩當歸白术細辛已上各五兩大黃五兩朴硝八兩熬右為末平旦空心服方寸匕加之得利為度療瘟瘧者可服鬼箭十味丸方甘草丁香細辛蜀椒烏梅肉各三兩地骨皮橘皮各四兩白术當歸各五兩鬼箭二兩右為細末煉蜜為丸如梧桐子大每服十五丸烏梅湯送下再服加至三十丸三五日後覺腹中熱以粥飲壓之療痢病方黃連黃苓各五兩黃茋黃柏各四兩龍骨八兩右五味為散空心粥飲調方寸匕日再加三寸匕止療榖痢方白术六兩附子四枚炮去皮乾姜四兩炮細辛五兩油麵末一升熬變色右為末以粥飲如前法療血痢方阿膠炒黃柏炙各四兩乾姜艾葉各三兩犀角末五兩右為末如前法服療膿血痢方黃茋六兩赤石脂八兩艾葉三兩厚朴炙三兩乾姜煨四兩右為末服法如前治霍亂方巴豆一兩去壳乾姜三兩炮大黃五兩右為末煉蜜為丸如梧桐子大米飲服三丸以利為度不利粥湯投之治腳轉筋方拍碎水煎五合服之愈本方云生姜一斤煎二升半服之入戰辟五兵不傷人方雄黃一兩白礬二兩鬼箭柄羖羊角燒二分半竈中土三分右為末以雞子黃并雞冠血為丸如杏子大置一丸於小囊中繫腰間及膞上勿令離身亦辟一切毒療馬齒毒方灰汁數斗暖者洗瘡處愈又以馬糞者亦可療馬膿垢附人作瘡方馬鞭梢二寸燒灰飛鼠七枚各燒灰敷之療金瘡傷因發者及傷裂突出腸方黃茋當歸芎窮白芷續斷黃苓細辛乾姜附子芍藥各三兩右件為末先飲酒醉次服五錢匕日三服又云服半錢七日三服加至方寸匕驗療金刃中骨脉中不出白斂半夏各二兩右為末酒調服方寸匕日三服至二十日自出立愈療金瘡傷中破驚方火燒葱取汁塗之立愈亦用女人中衣舊者以襠炙尉之為愈療馬墜損有瘀血在腹內方生地黃五升爛研以酒捎汁一盞日服三服至服愈又方地黃二升搗令乾以無灰酒半斗煮三二沸重户地暖飲之令醺療馬墜折手腳骨痛方右搗大麻根并葉取汁服之氣下乃蘇若無大麻子根葉研子溫酒調下亦得治馬藥方篇第八十一經曰馬有四百八病蓋在將調冷熱之宜常加消息春夏常灌馬方鬱金芎藭當歸大黃升麻黃連細辛今方不用當歸芎藭細辛却入黃柏吳藍青黛梔子秋冬加官桂乾姜右為末每灌七錢蜜油各一合湯半斤攪勻灌之其冷氣則加乾姜官桂各一兩今多以煮糯米粥半升油五合猪脂四兩蜜三兩早飲了啖之候日色溫來日復啖之馬熱不食水草方芒硝鬱金右每灌七錢入酥半兩水一升攪勻灌之云刺帶脉取出血治馬漏蹄方先以刀削令隱便次以髮灰羊脂填了以黃蠟固之療馬內黃不食水草顫喘臥數起口張喘急頭微垂利方青黛三兩大黃二兩白鹽五合右為末每灌三七油蜜各一合溫水一升灌之馬有黑汗出臥不起汗流如珠顫喘氣急嘗汁啖即死醎即不死取人汙襪燒湯挼濃汁灌三升瘥又方刀子割馬尾小頭作十字使出血以人糞塗之良或燒人糞以亂髮敷之差療馬轉胞不大小便方以人糞并大蒜橘湯成膏納尿孔中則立尿又纒馬腸放後蹄間挽之令跳自止療馬結草方以熱手捻令結消不消以火灸掃帚柄築之療馬蟲顙方桑根皮大棗肉葶藶子各一兩贅令黃色另研作膏右和勻水三升灌之一時辰令頭低滴鼻中惡物愈次以大黃油雞子清灌之又云桑白皮一握舊乾煮棗五十枚煮取穰葶藶子六兩贅令黃右以水六升桑根大棗味取汁一大升去渣內葶藶子膏攪勻相得更煎取强半停令冷暖得所分為兩度灌所患之鼻如人行八九里一灌乾地著草繫頭底即出鼻中惡物令甚走又以大黃油雞子灌之太白隂經卷七

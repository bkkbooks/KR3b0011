body:
  text: 太白隂經卷三唐李筌撰授鉞篇第二十五經曰有國疆場之役天子居正殿命將軍詔之曰朕以不德謬承大運致冦敵侵擾攻掠邉陲宵旰忘食憂在寤寐勞將軍之神武帥師以應之將再拜受詔乃令太史卜齊三日於太廟拂龜太史擇日以授鉞君入廟西面而立親操鉞以刃授將軍曰從此以往上至於天將軍制之復操斧柄授將軍曰從此以往下至於泉將軍制之將軍既受命跪而答曰臣聞國不可從外治軍不可從外御二心不可以事君疑志不可以應敵臣既受命專斧鉞之威臣不願生還請君亦無垂一言之命於臣臣不敢將君許臣乃辭而行軍中之事不聞君命皆由於將將出臨敵决戰無有二心若此無天於上無地於下無君命傍無敵人是故智者為之慮勇者為之鬬氣勵清爽疾若馳騖兵不授刃而敵降服戰於外功立於內於是將軍乃縞素避舍請罪於君君命捨之部署篇第二十六經曰兵有四正四竒總有八陳或合而為一或離而為八以正合以竒勝餘竒為握竒聚散之勢節制之變也一萬二千五百人為一軍一萬二千象十有二月五百象閏餘窮隂算陽備物成功征無義伐無道聖人得以興亂人得以廢廢興存亡昏明之術皆由兵也司馬穰苴曰五人為伍二伍為部部隊也一軍凡二百五十隊每十隊以為三竒風后曰餘竒握竒故一軍以三千七百五十人為竒兵隊七十有五外餘八千七百五十人部隊一百七十五分為八陳陳有一千九十三人七分五銖隊有二十二人七人為一隊陳之部署令舉一軍則千軍可知矣將軍篇第二十七經曰三軍之衆百萬之師張設輕重在於一人不可不察也一人大將軍智信仁勇嚴謹賢明者任二人副大將軍智信仁勇嚴毅平直者任一人主軍糧一人主軍馬四人總管勇嚴識軍容者任二人主左右虞候二人左右押衙八人子將明行陳辦軍革驍部署任八人大將别奏十六人大將兼侍從官吏八人副大將别奏一十六人總管兼八人子將别奏一十六人子將兼忠勇驍果孝義有藝能者任一人判官沉深計密事精敏者任懦鈍勿用一人主軍糧一人主征馬正主軍令斬斷罪𨽻及行軍禮儀進止賓客祭祀四人軍典謹厚明書算者任陳將篇第二十八經曰六者君立於陽大夫立於隂是以臣不得窺君下不得窺上則君臣上下之道隔矣夫智均則不能相使力均則不能相勝權均則不能相懸道同則不能相君勢同則不能相主情同則不能相順情異則不能相同故大將以智禆將以勇以智使勇可得而從哉一人偏將軍勇猛果敢輕命好戰者任二人副將軍無謀於敵有死於力守成窺而不失者任四人子將目明旌旗耳察金鼓心存號令宣布德威者任二人虞擒奸伏探覘非常伺察動靜飛符走檄安忍好殺事通惟時者任二人承扄㸃差均平更漏無失糾舉必中者任六人偏將軍别奏一十二人偏將兼六人副偏將别奏一十二人副偏將軍兼八人虞候兼充子虞候並惡驍勇果孝義藝能者任一人判官主倉糧財帛出納軍器刑書公平任二人軍典明書計謹厚者任隊軍篇第二十九經曰智者之使愚者也聾其耳瞽其目迷其心任其力然後用其命如驅羣羊驅而往驅而來莫知所之登高去其梯入諸候之境廢其梁役之以事勿告之以謀語之以利勿告之以害則可德其心而主其身如此則生死聚散聽之於我是謂良將一人隊將經軍陳習戰鬬識進止者任一人押官一人隊頭二人副頭隊主文書酬功賞知勞苦明部分行列疏密並責成於副隊副公直明曉者任一人東旗二人副旗並壯勇者任一人抱鼓主昏明嚴警進退節制氣勇志鋭者任一人吹角主收軍退陳謹守節制懦怯忠謹者任一人司兵主五兵利鋭支分器仗明辨者任一人司倉主支分財帛給付軍糧清亷者任一人承局主雜供差料人情惡口舌者任五人火長主厨膳飲食養病守火內衣資樵採戰陳不預仁義者用任征馬篇第三十經曰夫戎馬必安其所處適其水草節其飢飽冬則溫廏夏則涼廡刷剔毛鬛謹落四蹄押其耳目使不驚駭習其驅馳間其進止人馬相親然後可使鞍勒轡銜必先完堅固斷絶必補凡馬不傷於末必傷於始不傷於飢必傷於飽日暮道逺必數上下寧勞於人慎無勞馬常令有餘備敵覆我能明此者可以橫行八方凡馬軍一人支兩匹一軍征馬二萬五千匹其無馬亦加五支令以兩匹為率一征馬副大將軍軍中擇善牧養者任二人征馬總管副偏將軍軍中擇善牧養者任八人征馬子將軍陳中擇明間養牧者任五十人征馬押官軍中擇取善牧養者任五百人羣頭善乘騎者任一人羣頭醫亦羣頭中取外差一千人馬子軍外差又云五百人馬子醫馬在內鑒人篇第三十一經曰凡人觀其外足知其內七竅者五臟之門戶九候三停定一尺之面智愚勇怯形一寸之眼天倉金匱以别其貴賤貧富夫欲任將先觀其貌乃知其心神考其形法容貌堂堂精爽清徹聲色不變其志榮枯不易其操是謂神有餘形心有餘法頭頂豐停腹肚濃厚鼻圓而直口方而稜頥額相臨顧耳高聳肉多而不餘骨粗而不露眉目明朗手足鮮紅望下而就高比大而就小是謂形有餘神心有餘法遏惡揚善後己先人無疾人以自貪無危人以自安好施隂德常守忠信豁達大度不拘小節是謂心有餘神鑒頭目鼻口舌齒法虎頭高視富貴無比犀頭崒嵂富貴鬱鬱象頭高廣祿福居長鹿頭側長志氣雄强龜頭郁縮喉豐酒肉獺頭橫濶志氣豁達駱頭䝉鴻福祿千鍾蛇頭平薄財帛聊落狢頭尖鋭貧厄無計兔頭蔑頡志氣下劣狗頭尖圓泣涕連連眉直頭昂富貴吉昌眉薄而希少信多欺髮欲細密鬚欲粗疏眼目光彩明靜者貴眼鼻成就者魂魄强眉目慈善者好施與眼鼻口小者多虗無實眼鼻口大者有實無虗眼中赤脉貫瞳子竒兵死雞目捲頭不淫即偷羊目直視無情好殺猪目應瞪刑禍相仍亦小貴蜂目豺聲常行安忍枯髏目心難測魚目多厄鼠目窮寒鷹視狼顧常懷嫉妬牛頭虎視富貴無比目隆圓實富貴終吉鼻孔小縮慳貪不足蜣蜋鼻少意智野狐鬢無期信羖羊鬢多狐疑口如鳥啄雄心難制口如馬嘴窮來客死口如河海富貴自在唇如㸃朱才學代無舌紅目厚神識自守吐舌及鼻有壽且貴鋸齒食肉平齒食菜疏齒猛毅密齒醇和細齒長白名曰猊齒鑒頷耳項胸背面肚黑子靣形法燕頷封侯腮尖足肉意智不足耳輪厚大者貴而且壽小薄者夭而且賤虎項圓粗富貴有餘雞頸烏頭財物乏少起居露處凶惡非凡面欲圓胸欲方尻欲厚背欲圓上欲長下欲短五嶽成四瀆好頭高足短臂長似虎所謂行住坐卧飲食音似非一處也鑒頭骨玉枕額文法腦頭聳起者將軍三關玉枕萬户侯近下者將軍車輻枕封侯三星枕封王偃月枕封侯木方枕二千石酒樽枕二千石三公字枕封侯圓枕封侯額上有北字文將軍額上兩立文二千石眉間有四文封侯八眉間有八字龍文將軍額上有三偃月文封侯額上有覆月文將軍眉上有文通髮將軍土眉間有土字文封侯文眉間有文字文者死凡人色欲正不欲邪白如凝脂黑如傅漆紫如爛椹黃如蒸栗赤如炎火青如浴藍皆三公將相也相馬篇第三十二經曰相馬之法先相頭目耳耳如批竹眼如鳥目麞脊麟腹虎胸尾如垂帚次相頭稜角成就前看側看但見骨側狹見皮薄露鼻衡柱高低額欲伏臺骨分明分假清楚視瞻欲逺精神體氣高爽立蹄攢聚行止循良走驟輕操毛鬛輕順喘息均細擎頭如鷹龍頭高舉而逺望深視而逺聼前看如雞鳴後看蹲扄立如獅子避兵萬里頷鼻中欲得受人拳名曰太倉太倉寬易飼胸臆欲濶胸前三臺骨起分假分明鬛欲高頭欲方目欲大而光脊欲强壯有力腹脅欲張四下欲長耳欲緊小小即耐勞目大膽大膽大則不驚鼻欲大鼻大則肺大肺大則能走膁欲小小則易飼肋欲得密口欲上尖下方舌欲薄長赤色如朱齒欲齶瓣分明牙去齒二寸欲下廣且平方牙欲白則壽長望之大就之小斤馬也前視見目傍觀見腹後視見肉駿馬也齒欲齊密上下相當上脣欲急而方下唇欲緩而厚口欲紅而有光如穴中看火千里有壽臆間欲廣一尺以上能久走頭欲高如剝兔龍顱突目平脊大腹脛肉多者行千里眼紫縷貫瞳子者五百里上下徹者千里凡馬不問大小肥瘦數斤有十二十三四百里十四十五五百里旋毛起腕膝上者六百里腹脊上五百里項轅大者三百里目中有瞳人如並立並坐者千里羊鬚中生距如雞者五百里耳本下角長一二寸者頭如渴烏者千里馬初生無毛七日方能行者千里尿過前蹄一寸以上者五百里屎舉一足如犬者千里腹下逆毛千里蘭孔中有斤皮及毛者五百里眼上孔是也蹄青黑赤白紅硬如鋒有隴道成者軟口又吻頭厚者硬口又淺小者不能食眼下無狀蟲及骨肉者咬人目小多白驚後蹄欲曲腕耳中欲促凡馬後兩足白者老馬駒前兩足白者少馬駒馬有五勞缷鞍不𩥇者骨勞𩥇而不起者斤勞起而不振者皮勞振而不噴者氣勞吐而不尿者血勞絆之却行三十步瘥皮勞以手摩兩鞍下汗出瘥氣長韁牽之行得尿瘥血勞高繫勿令低頭而食瘥馬口春青色夏赤色秋白色冬黑色皆死此名入口病也誓衆軍令篇第三十三經曰陶唐氏以人戒於國中欲人强其命也有虞氏以農教戰漁獵簡習故人體之夏后氏誓衆於軍中欲人先其慮也殷人誓於軍門之外欲人先意以待事也周人將交白刃而誓之以致人意也夏賞於朝賞善也殷戮於市戮不善也周賞於朝戮市兼質文也夫人心定言以言出令故須振雄略出徑詞鋭鐡石之心凛風霜之氣發揮號令申明軍法誓衆文某將軍某乙告爾六軍將吏士伍等聖人弦木為弓剡木為矢弧矢之利以威不庭兼弱攻昧取亂侮亡今邊方不庭式干王命皇帝授職斧鉞肅將天威有進死之榮無退生之辱用命賞於祖不用命戮於社將無二令軍無二言勉爾乃成慎從王事無二典刑軍令經曰師衆以順為武有死無犯為恭故穰苴斬莊賈魏絳戮楊干而名聞諸侯威震鄰國令之不行不可以稱兵三令而不起於發者吏士之罪也申明而不如法者將之過也先申三日懸令於軍門付之軍正使執本宣於六軍之衆有犯令者准令按理而後行刑使六軍之禁勿敢違也一漏軍事者斬漏泄軍中隂謀及告事者皆死一背軍走者斬在道及營臨陳同一不戰而降敵者斬背順歸逆者同一不當日時從期者斬計事㑹戰同阻雨雪水火不坐一與敵人私交通者斬籍沒其家言語書疏同一失主將者斬隨坐即不坐一失旌旗節鉞者連隊斬與敵人所取同一臨難不相救者斬為敵所急不相救者同誑惑訛言妄說隂陽卜筮者斬妄說鬼神災祥以動者同一無故驚軍者斬呼呌奔走妄言烟塵有賊者同一遺棄五兵軍裝者斬不謹固檢察者同一自相竊盜者斬不計多少一將吏守職不平藏情相容者斬理事曲法者同一以强凌弱摴蒱忿爭酗酒喧競惡罵無禮於理不順者斬因公宴集醉者不坐一軍中奔出車馬者斬將軍以下並步入營乘騎者同一破敵先虜掠者斬入敵境者亦同一更鋪失候犯夜失號擅宿他火者斬恐奸得計一守圍不固者斬一火及主吏者斬一不復差遣及主吏使不平者斬有私及强梁者斬一侵百姓姦居人子女及將婦人入營者斬恐傷人軍中慎女子氣一違將軍一時一令皆斬關塞四夷篇第三十四經曰關塞者地之要害也設險守固所以阻隔蠻夷內諸夏而外夷狄尊衣冠禮樂之國卑氊裘毳服之長是以要荒侯甸從兹别矣關內道自京西北出關鎮經朔方節度去西京一千八百五十里去東京二千里關五原塞表胸奴之故地以渾部落為臯蘭都督府斛律部落為高關州渾甸焦部為浚稽州魯嚴塞下胡州党項十四州拓跋舍剎僕國野剎桑乾節子等部落救其原野黃河北道安北去舊西京五千二百里東京六千六百里今移在永清去西京二千七百里去東京三千四百里關大漠以北回紇部落為瀚海都督府多覽部落為燕然督都府思結部為廬山都督府同羅受按一口部落為幽陵都督府同羅部落為龜林都督府甸剎羽為雞田州奚結部落為雞鹿州道歷隂山牟郍山龍門山牛頭山鐡勒山北庭山大刺山諾真山涉黑沙道入十姓部牧居地河東道自京西東出蒲律關經太原扺河東節度去西京二千七十五里去東京一千六百四十五里開榆林塞北以頡利左渠故地置雲中都督府管阿史那等五州道歷三川口三山母谷道通韋室大落泊東入溪西入默啜故地隴右道自京出震關經隴西節度去西京一千四百里去東京二千二百七十五里南出關黨項雜羌置崌叢麟可等四十州分利緣邉諸府西拒吐蕃去西京一萬二千里北去鳯林關渡黃河西南入鬱標桞谷彰濠青海大非海鳥海小非海星海泊悅海萬海白海魚海入吐蕃河西道自西京北出蕭關金城關自河西節度去西京二千一十里去東京二千八百十一里北海扺日停海彌峨山獨洛河道入九姓十箭三窟故居道北庭道自北京西北出經河節度出玉門關涉河關菖蒲海東出高昌故地置西州以突厥處密部落為瑶池都督府以雜種故胡處部為庭州為北庭都護去西京一千七百五十六里去東京六千七百七十六里北扺播塞厥海長海關海曲地以突結骨部落置堅昆都督府管拘勃羅都督為燭籠州北扺瀚海去西京二萬里安西道自西京出涉交河出鐡門關至安西節度去西京八千五十里踈入踈勒鄢耆碎葉于闐黑海雪海大宛月支康居大夏掩蔡黎軒支烏孫等國劍南道自東京西南出大散關經甘亭關百牢關越劍關松嶺關至劍南節度去西京二千三百七十里去東京三千二百一十六里出蠶涯關過筏道雜羌六十四州分列山谷路入吐畨南出卭僰開通越嶲渡慮河雲南關西徼行雜蠻置冉蒙弄覽六十州路入甘河夜郎滇池身毒五天竺國去西京三萬五千里范陽道自西京出潼關至范陽節度去西京二千五百二十里去東京一千六百八十六里北去居庸關盧龍門塞外東湖故地以契丹番長置饒樂都督府回紇五部落分為五州以白霫部落為居延州黑霫部落為置顔州北至烏羅渾去東京一萬五千里平盧道自西京經范陽節度東至榆林關至平盧節度去西京三千七百里東京三千里抵安東遼水路接奚契丹室韋勃海鞨高麗水黑嶺南道自西京南出藍田關漢越江大庾嶺經南海節度去西京五千六百里去東京四千二百七十里路入銅柱林邑九真日高真臘銅勒交趾等國河西道自西京出潼關經東萊節度去西京二千七百六十里去東京一千八百五十三里東涉滄海拒熊津都督府北濟國又東抵雞林都督府新羅國又東南涉經海抵利磨國屬維涉海達倭國一名日本其海行無復里數太白隂經卷三

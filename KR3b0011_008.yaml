body:
  text: 太白隂經卷八唐李筌撰雜占總叙第八十一經曰天文者懸六合之休咎兵書者著六軍之成敗今約一戰之事編為篇目其餘災變昧而不書夫天道逺而人道邇人道謀而隂故曰神成於陽故曰明人有神明謂之聖人夫聖人者與天地合其德日月合其明與四時合其序與鬼神合其吉凶故曰先天而天弗違後天而奉天時天且弗違而況於人乎况於鬼神乎人若謀成䇿勝則天地日月鬼神皆合之人若謀缺䇿敗則雖使大撓步厯黃帝拔元甘德占星巫咸望氣務成災變風后孤虛欲幸之勝未之有也蓋天道助順所以存而不亡若將賢士鋭誅暴救弱以義征不義以有道伐無道以直取曲以智攻愚何患乎天文哉可博而解不可執而拘也占日篇第八十二經曰日者實也光明盛實布照四方神靈御之葵霍向之太陽之精積而成象光明內發休魄內含故人君法之吉凶禍變必照臨下土日珥者拜大將軍有軍在野珥南則南勝珥北則北勝東西准此兩軍相對將欲解和日暈而珥外軍凶日抱暈隨抱軍勝日有白足破軍殺將日有背氣色青赤曲向外為背叛之象其外有臣叛將軍守邊有二心日有玦氣似背有枝直向外如山字兩軍相當所臨者敗日有暈氣傍日周圍中赤內青營軍之象對敵之上色濃厚者隨方軍勝日月皆暈兵陳不合七日暈不解不可起兵暈而珥外兵凶日抱暈而珥者易上將日暈而玦者兩軍相當隨玦兵敗日暈而直氣在傍所臨軍勝日暈而背虹珥反直而貫之者順虹擊之大勝兩軍相當日有冠纓者和解抱戴者大喜日暈而有兩珥在內外者并有雲聚不出三日下有圍城占月氣色篇第八十三經曰月者缺也盈極必缺太隂之精積而成象光以照夜女生之義此德刑罰吉凶休咎以警戒于下土月有暈先起兵者勝月暈抱戴有赤色在外外人勝在內內人勝月暈抱戴赤色明客勝月暈歲星赤色客勝火入月中色惡客敗色明客勝月暈鎮星色不明主勝色明客勝月暈太白色不明主勝色明客勝月昏星辰不明主勝色明客勝月暈亢先起兵有喜且勝軍出月蝕凶月昏房糠大風起月暈參伐兵起有軍不勝有占五星篇第八十四經曰五星者昊天上帝之使也稟受帝命各司其職雖幽潛深逺罔不悉及之故福德祐助禍淫威刑或順軌而守常或錯亂而表異光芒角變色動衰盛居留干犯勾衝掩密所以告示下土凡五星各有常色本體吉歲星青熒惑赤如參左角狀鎮星黃太白白如五車大星辰星黑凡五星青為飢憂赤圜為旱交爭黃熟女主吉白兵喪黑水疾五星黃角有兵交爭赤角犯我城白角有邊兵青角憂愁生黑角死喪行五星色變常者青憂白兵赤旱黑喪黃熟歲星木星占木乘金偏將軍死木金合鬬將死木守七星天下起兵木乘昴國有憂畨主死木入畢中邊起兵木犯畢附耳起兵木守參代有兵木犯井兵起木經柳有兵木守軫罷兵木入天將軍興軍吉木入五車兵起木守羽林兵起木星犯參旗大將軍出征凶熒惑火星占火用宜背火在鶉火之次宜背午地他皆倣此火犯木土主大戰不勝亡偏將軍熒惑環太白偏將軍死火與太白相連而鬬破軍殺將火入太白中上出破軍殺將客勝火所不利先火起犯左右角有兵火守亢有兵火入亢有兵水災火入房馬貴出房馬賤火入糠兵起火犯南斗破軍殺將吳主死中國飢火入牛破軍殺將越主死火入須女入危兵起火犯東壁伏兵起火守昴邊人不安入昴胸奴破期三年火犯畢左角大戰右角小戰五星犯畢邊兵起火犯附耳兵起火犯觜趙地兵起火犯參有兵火入東井一星將軍野戰死火犯輿鬼兵起火守七星外有兵起火乘張有兵火與張合兵起有殃火守張大將軍驚火犯翼邊兵起火入軫有兵火行南河界有邊兵火犯太微上將上將亡次相次相亡火犯角大臣亂而有憂入亢有白衣㑹主將死人多疾疫入氐主兵起失國赦天下惡吉火犯心戰不勝大將死絶嗣大臣亂主出營有哭泣入尾臣下妖淫年多妖祥大亂入箕榖大貴妃后惡之燕王死入虛齊王死相走出兵罷犯畢人疫臣反主崩大水兵起入壁魏王死天下兵留壁二十日土工米貴女主惡之犯奎魯王凶大水大疫大臣謀主犯婁有暴兵有死主大飢盜賊起犯胃趙大有兵主大勝犯鬼執法有誅天下大疫有女喪大赦吉犯柳有木工犯星大臣亂易服色鎮星土星占土犯星左角大將戰死水災土守右角兵路不通土守亢有兵臣下反土守糠大兵起土入天廟有兵起土守虛出入有客兵至不過五日自去入奎兵起土入婁邊兵起天下凶土入胃客軍敗主軍用土入昴畨王死畨人為亂土入觜兵起土逆行守參有畨兵土守牛越兵起土出入胃舍七星兵起於大海濱土守張多盜賊兵起興土工土入軫兵發而自敗入天庫有兵土守南河蠻夷起兵邊界有憂土出東掖門為將守事東出德事出西掖門為將守事西出刑事犯氐星皇后憂宮人死天下大疫犯房天下相代皇妃亡邊兵反犯心天子絶嗣將相死放大赦修德吉犯尾天下不安后妃惡之犯箕大亂女主憂民流亡大兵起犯斗其國失地先後旱大臣逆亂犯牛有奸賊牛馬棄于道天下急宜赦犯女更往令天子喜有女喪犯虛有刑令大憂有客兵鈇鉞用入危天下亂國亡將死人哭泣入室關梁不通貴人死女子恣橫犯壁逺方入貢國大水天下立王犯畢令不行將相亡入觜相死兵大起侵死有反者犯參多水旱邊兵起入井水旱大臣死犯鬼多戮死秦地有反太白金星占太白一名長庚西方金德白虎之精招搖之使其性義斷其事言詞其時秋其日庚辛其辰申酉其帝少皡其神主蓐收太白主兵馬為大將軍為威勢為斷割為殺伐故用占之是以重述其德異於常星也金體大而色白光明而澤潤所在之地兵强國昌兵出則出兵入則入順之吉逆之凶出高深入吉淺入凶先起勝出下淺入吉深入凶後起勝金晝見有軍軍罷無軍軍起金出東方始出為德月未盡三日在月南德行在月北失行是謂反生不有破軍必有屠城北國當之金出東方月未盡三日月在北圓海之國不勝在月南中邦不勝在月北敗謂失行金入火必敗兵金西方為德月三日金在月北員海之國戰勝在月南員海之國敗金與月相夾有兵拔城偏將大戰金與月共出守者屠城金與列宿相犯小戰金與五星相犯大戰金在南南軍勝在北北軍勝金出東方舉事用兵順之吉逆之凶西南北皆倣此金守南斗三十日夷狄來侵金入羽林兵起金蝕畢昴畨王死金光暗戰不勝將軍死金變色戰勝隨方色青東方他皆倣此金入月客軍大敗野有死將金白而角文可戰色赤而角武不可與戰金與木合無怒必戰金應出而不出應入而不入此謂失舍不有破軍必有死將所受之邦不可與戰未當出而出未當入而入必有破軍于野金受十日後將軍死金初大後小兵弱初小後大兵强金有角有兵敢戰吉不戰凶順角指處擊之吉逆凶金行遲兵遲行金行疾兵疾行金大行用兵疾吉遲凶金入則兵入出則兵出兵行法此金木一東一西害侯王一南一北兵乃伏金犯畢左角左將死金入月客將死金出而水沒金水俱出東方東軍勝西方西軍勝水居金前軍罷水居金北小戰金南大戰金進則兵進金退則兵退金出未高而敵深者勿與戰去而勿追金赤角兵戰白角則軍起黑角軍罷青角軍憂白角又主國喪軍亡隨角所指處應金晝見是謂經天金犯五星大有兵起犯火大戰在南南勝他皆倣此金犯角大戰不勝將軍死金陵房赤色有兵戰金干亢大將不勝將軍鬭死金入留守尾兵起於野將士滿道金入南斗將軍死金犯南斗破軍殺將金犯牽牛將軍失其衆守牛兵起金入危犯守有兵起金入營室暴兵滿野將軍死金守犯東壁大兵起金入奎兵起外兵來入國金犯守婁將軍功金守胃兵起金守昴番王死四夷憂金犯畢邊兵起金犯左角邊兵大戰金入畢馬貴兵有傷金犯觜兵起宜用斧鉞金犯守參主邊兵起左右肩大將憂金犯參伐兵起金守犯東井將軍惡之金入東井大兵起金入柳大兵起益地金犯輿鬼大兵起金入翼大將死天下兵起金犯七星將軍出塞金犯軫其國出軍得地辰星水星占水土合為覆軍水出東方大而白有兵在外解金水俱出東方員海國勝水入月主人敗兵亡地水金合旗出破軍殺將客勝視其所指以命破軍水環繞太白興兵大戰客勝主人敗水遇金其間可容劍小戰則客勝水出太白左小戰磨太白又去三尺軍戰水在金北利主人在金南利客水房守北軍敗水守婁北兵起水干昴夷狄兵起水守心大臣相殺大水異姓立王犯尾大水犯箕有赦若守左角動色貴臣戮死犯斗大臣誅一曰兵守赤色天下敗兵犯斗五榖不成守水湧犯女有婚娶事萬物不成犯虛天下亂多水犯危大水有後喪臣謀君主犯室有兵大水犯壁刑法苛朝廷憂犯奎有火為害水乘昴出其北畨王死中國大水水入畢有兵出北北主憂出南南憂犯觜發兵水守參伐星移南南蠻下移北北畨侵水入東井星進兵進星退兵退水干犯輿鬼兵起水入庫兵起水入柳牛馬貴犯星臣亂水守張兵起大水水入翼中刑及賢相大凶犯軫大兵起喪物不成犯角大水舟船相望犯亢大水干犯五車兵起水留心南河兵起西方占流星篇第八十五經曰夫流星者天之使也自上而降下曰流自下而升上曰飛大者曰奔小者曰流星大則使大星小則使小星者謂紫微宫太微宫出入而徐行漸經次於列宿之次也或於列星之坐為使也聲大怒之象行疾則其疾行遲則其遲非二宫出者並為妖星流星赤色有角者四夷前赤後黑兵敗將亡流星入參不出先起者勝後起者敗流星干七星者兵起流星入建星者色青兵起流星入河鼓者大將軍亡出河鼓兵出入河鼓兵入流星入王良馬盡驚流星入天將軍軍驚流星入將入星出將出流星入紫微宫胸奴兵起流星入三台大將出流星入騎官騎官死流星入羽林兵大起流星抵北落兵大起流星出天宮胸奴兵起流星抵天市垣大將出流星抵天狗犯弧矢將有千里之行使星出天廄兵馬出占客星篇第八十六經曰客星者非本位之星故曰客星也色白如氣勃勃然似粉絮故所過之宿分野必有災害客星出營室無兵則兵起有兵則兵敗客星入奎破軍殺將客星犯婁邊人亂客星入昴邊人犯塞客星入畢邊有急兵客星干觜城堡虛兵儲少軍民餓死客星守張將軍有隂謀兵起客星入招搖邊軍大起客星入天槍中兵起客星入天棓兵起客星犯文昌將星色蒼將有憂色多赤將驚色黃將有喜色黑將死客星守傳舍邊人入中國客星守天難天下兵馬盡驚客星守天街畨王死客星入庫婁與守南門與守軍士守老人皆主兵起客星守騎官將憂士卒散客星守北落師門虜人入塞兵起客星入天倉粟大貴天客入天廄兵起馬死客星入天弓天下弓弩皆張客星出天弓丐奴兵起客星守狼夷狄來降客星守弧南夷降客星守車騎西羌來降客星守九州珠口員海國不安客星入天節畨王死占妖星篇第八十七經曰妖星者五星之餘氣結而為妖殊形異狀凶多吉少所見之分必有災害奔星所墜之下有大兵起流星前赤後黑客軍敗散流星從敵營上來我軍上鋭者有間諜來說吾兵流星尾長三四尺輝輝然軍使也色赤者將軍使也流星色青赤有光尾長三四尺者名曰天鴈將軍之精華也兵從星所擊者勝流星色蒼白為使赤有兵黑將死飛星如大甕後大曉然白前卑後髙所謂頓頑大將死邑削飛星後化雲者名曰大滑流血積骨之象枉矢類流星色青蛇形如矢而枉道所指將軍死天狗如奔星有聲墜如火光炎炎燭天其下有積尸流血狗來食之占雲氣篇第八十八猛將氣勝軍氣敗軍氣城壘氣伏兵氣暴兵氣戰陳氣隂謀氣四夷氣逺近氣經曰天地相感隂陽相薄謂之氣久積而成雲皆物形於下而氣應於上是以荆軻入秦白虹貫日髙祖在沛彤雲自覆積蜃之氣而成宮闕精之積必形雲之氣故曰占氣而知事望雲而知其人也占猛將氣猛將之氣如龍如虎在殺氣中猛將欲行先發此氣如無將行當有暴兵起吉凶以日神占之猛將之氣如煙如粉沸如光火夜照人猛將之處有赤白氣相繞猛將之氣如山林如竹木色如紫蓋如門樓上黑下赤如旌旗如張弩如塵埃頭尖本大而髙兩軍相當敵軍器上氣如囷倉正白見日愈明此皆猛將之氣不可擊也敵人營上氣黃白潤澤將有威德不可擊也氣青白如膏將勇大戰前白如卑後青如髙將怯士勇前大後尖小將怯不明敵上氣黑中赤氣在前者將精悍不可當敵上青氣而踈散者將怯然軍上氣發漸漸如雲裏山形將有隂謀不可擊若在吾軍之上速戰大勝敵上氣如蛟蛇向人此猛將之氣不可當若在吾軍之上速戰大勝占勝軍氣氣如火光如山隄如塵埃粉沸如黃白旌旗無風而飄揮揮指敵此勝軍之氣所在勝軍不可擊雲氣如三匹帛前橫後大氣如樓緣似赤氣者所在兵鋭不可擊軍上有氣如人持斧如蛇舉首而向敵者皆勝氣如匹帛者此助勝之氣所在不可擊軍上氣如覆舟如牽牛如鬬雞所在不可擊軍人有五色氣連天不可擊軍上有雲氣如華蓋如飛鳥如伏虎所在不可擊攻軍上氣如五馬頭低尾仰如杵如赤馬在黑氣中如黑人在赤氣中如杵在黑雲中如人十十五五旌旗在黑氣中有赤色在前者皆精悍亦不可擊占敗軍氣敗軍之氣如馬肝如死灰如偃蓋如臥魚乍見乍隱如霧之朦朧衰氣也若居敵上宜急擊之雲氣如壞山從軍營而墜軍必敗氣昏發連夜照人則軍士散亂軍上有氣一斷一續軍必敗軍上黑氣雲如牛狀如猪脂如羣羊名曰瓦解之氣軍必敗軍上有雲氣如雙蛇擊之勿疑軍上氣如塵灰如粉煙雲霧勃勃撩亂者軍敗軍上有五色雜氣東西南北不定或如羣鳥亂飛如紛紛如轉蓬或如敗船或如臥人無手足或如覆車散亂不起者皆敗軍之氣擊之必克軍上氣上大下小者士卒日减軍上氣十日無氣發者其軍必敗十日無氣忽有赤白氣乍出即滅者外聲欲戰實欲退散軍上氣出而半絶者欲敗漸盡者走一絶一敗再絶再敗三絶三敗在東發白氣災深赤氣如火光從天而下入軍軍亂將死軍上氣蒼蒼須臾散或前高後卑或黑氣如牛馬形從氣霧中漸漸入軍名曰天狗食血其軍散敗兩軍相當十里之內三里之外望彼軍上氣高而後前白青散者敗氣也雲氣如人頭雞兔臨軍上雲蓋道蔽濛晝晦者宜急走不然必敗軍上氣先青而變黑者其將必死散軍之氣如燔生草之烟前雖鋭而後必退軍上氣如丹蛇者如尾在氣霧中臨軍上者中人與外人通軍行有白氣如猪來臨者大驚宜備日暈有氣如死蛇屬暈者不利先舉日暈旁有赤雲如懸鐘其下死將日月暈有背所臨者敗白虹及霓入營者敗日暈有四玦在外軍悉敗散日暈薄及後至先去其下敗軍降氣如人十十五五皆低頭義手相向或氣如黑山以黃為緣者白氣如鳥趣入屯營連絡不絶須臾下者當有來降城壘氣正白如旌旗或白氣如旗而赤界其邊或氣出於外如火煙或有雲分為兩截狀如城壘皆堅而不可攻白氣如城中南北出者城上黑雲如星名曰軍精宜急解去赤雲或黃雲臨城城中喜青雲從軍城南北出者不可攻城上有雲青色如牛頭觸人外向者城中有氣出東其光黃大一城也白氣中出青氣入北反覆回還不可攻凡攻城圍邑過旬不雷不雨者為城輔勿攻城壘氣出于外如烟火者或如雙蛇舉首向敵或赤氣如杵形從城中出向外內兵突出客敗凡攻城有諸氣從城中出兵不得入濛氣繞城而不入城外兵不得入日暈有青氣從中起四出者圍中勝凡攻城有黑氣臨城者積土固險之象黑者水之氣城池之象也我據城敵不可攻敵據城我不可攻凡圍城平旦視圍上氣鬱鬱如火光芒勢翕翕然者其方救至無者救不至受圍者望外救亦以是占伏兵氣氣如赤杵幢節在烏雲中或如烏人在赤氣中或黑氣渾渾圓而赤氣在其中或白氣粉沸起如樓狀其下皆有伏兵若軍行近山谷之間林坑甚防之雲紛紛綿綿相絞及似蒿草長數尺者以車騎為伏兵如布席似蒿草長尺者者步卒為伏兵黑雲出營南賊逃我後有伏兵謹候察之兩軍相當赤氣伏兵氣若前有赤氣則前有伏兵後有赤氣後有伏兵左右亦如之黑雲變赤反白形如山者有伏兵雲如山林或前有黑氣後有白氣者有伏兵暴兵氣氣白如瓜蔓連結部隊相逐須臾罷而復起或如八九而來不斷者有急賊至白氣如仙人衣千萬連結部隊相逐罷而復興當有千里兵來黑氣從彼來我軍者欲襲我也敵人急宜備不宜戰敵還從而擊之必得小勝天色蒼茫而有此氣依支干數內無風雨所發之方當有暴兵日克時則凶時克日則自消散此氣所發之方當有事告急一人來則氣一條依數計之若散漫一方則有衆來依日支干數內有風雨則伏兵氣如人持刀盾或有雲如坐人赤色所臨城邑有猝兵至赤氣如人持節雲如方虹或如赤虹其下暴兵或如旌旗如虎躍如人行或白氣如道帶竟天或白虹所出或赤雲如火或雲如匹布著天經丑未者天下多兵赤者尤甚有雲如番人列陳或白氣廣五六丈東西竟天有雲如豹五六枚相聚或如狗四五枚聚四方清明獨有赤雲赫然者所見之地兵起四望無雲獨有黑雲極天名曰天溝兵起壬子日俟四方無雲獨有雲如旌旗其下兵起遍四方天下兵起雲氣一道上白下黃白色如布匹長數丈或上黃下白如旗狀長三二丈或長氣純赤而委曲一道如帛布皆謂之蚩尤旗見兵大起戰陳氣氣如人無頭如死人如丹蛇赤氣隨之必有大戰殺將四里無雲獨有赤雲如狗入營所下有流血或獨見赤雲如立蛇或赤雲覆船其下大戰白虹或赤虹屈見城營上其下大戰流血白氣如車入北斗中轉移者大戰雲如耕隴大戰日旁白氣如虹或白氣如虹交見兩軍相當必交戰無軍兵起四五六虹見大戰日月有赤雲截之如大杵軍在外萬人戰死兩軍相當其下不利先舉日暈有一缺萬人死其下兩軍不利先舉月初滿而蝕有軍必戰蒼白雲氣經天其下有拔城大戰赤氣漫漫如血色有大戰流血隂謀氣氣白而羣行徘徊結陳來者他國人來相圖謀也不可應視其所往隨而伐之可得黑氣如幢出于營中上黑下黃敵欲來求戰而無誠實言信相反九日內必覺備之吉黑氣臨我軍如車輪行敵人謀亂國有小臣勾引宜察之黑氣如引索來如陳前鋭者有隂謀天沉隂不雨晝不見日夜不見星月三日已上者隂謀也將軍宜慎防左右連隂十日亂風四起欲雨不雨其曰濛為臣謀君天隂沉日月無光有雲障之不雨為此君臣俱有隂謀兩敵相當則隂謀起若晝隂夜晴君謀臣夜隂晝晴臣謀君日月濛濛無光士卒謀亂內將軍宜循法度察有功以自明止嚴刑而伺奸人謀議也四夷氣海旁蜃氣象樓臺廣野氣成宮闕自華以南風上黑下赤嵩髙山河氣正赤恆山之北氣清渤海之間氣正黑江淮之氣皆白東海氣如篔簦河水氣如引布江漢氣徑如杼濟水氣如黑㹠渭水氣如狼白尾淮南氣如白羊少室氣如白兔青尾恆山氣如黑牛青尾東夷氣如樹西夷氣如室屋南夷氣如闍臺或如舟船幡旗北夷氣如羣羊如穹廬韓雲如布周雲如車輪秦人如行人衛雲如犬齊雲如絳衣越雲如龍蜀雲如囷宋雲如車魏雲如鼠吳雲如日當其地而見者不占逺近氣凡候氣之法氣初出時若雲非雲若霧非霧倣佛若可見初出森森然若在桑榆之上髙五六尺者是千五百里外氣也平視則千里舉目望則五百里仰望中天即百里內平望桑榆間二千里登髙下屬地者三千里凡候敵上氣敵在東日出候之在南日中候之在西日入候之在北夜半候之欲知我軍常以甲巳日及庚子戊午日未日亥日及八月十八日去軍十里登髙望之但百人以上則皆有氣凡氣欲似甑出炊氣勃勃而上升外積結成形而後可占氣不積結散漫不定不能為災祥必須和雜殺氣森森然乃可論也凡軍城上氣安則人安氣不安則人不安氣盛則衆盛氣衰則衆衰氣散則衆散凡氣得旺相色吉休囚死色凶軍上氣高勝下厚勝薄實勝虛長勝短澤勝枯凡占災祥先推九宫分野六壬月日不應隂霧風雨其下乃凖凡氣候氣常以平旦下晡日出沒之時蓋氣多假月光耀照之而形故暈珥抱背皆出日月之旁虹霓相象莫不因實而見是故晝候日旁夜候月旁輝光所燭無得而隱矣凡氣見近三日逺七日內有大風雨則災不成故曰風以散之雨以解之凡軍行先觀其氣兵有勝負氣有盛衰氣鋭兵强氣伏兵弱兵行氣行兵往氣往兵急氣急兵散氣沒故曰氣是兵主風是兵苗為將者不可不知也太白隂經卷八
